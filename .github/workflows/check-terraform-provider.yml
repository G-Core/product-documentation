name: Check Terraform provider version

on:
  schedule:
    - cron: '0 9 * * *'  # every day at 09:00 UTC
  workflow_dispatch:      # allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Python dependencies
        run: pip install -r .github/scripts/terraform/requirements.txt

      - name: Get latest v2 provider release
        id: provider
        run: |
          LATEST=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/G-Core/terraform-provider-gcore/releases?per_page=50" \
            | jq -r '[.[] | select(.tag_name | startswith("v2."))] | sort_by(.published_at) | last | .tag_name // empty')
          if [ -z "$LATEST" ]; then
            echo "Could not fetch latest v2 release tag. Exiting."
            exit 1
          fi
          LATEST="${LATEST#v}"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest v2 provider release: $LATEST"

      - name: Get tracked version from state file
        id: pinned
        run: |
          STATE_FILE=".terraform-provider-version"
          if [ ! -f "$STATE_FILE" ]; then
            echo "State file $STATE_FILE not found. Exiting."
            exit 1
          fi
          PINNED=$(cat "$STATE_FILE" | tr -d '[:space:]')
          echo "pinned=$PINNED" >> "$GITHUB_OUTPUT"
          echo "Last tracked version: $PINNED"

      - name: Skip if versions match
        if: steps.provider.outputs.latest == steps.pinned.outputs.pinned
        run: |
          echo "Provider version matches tracked version (${{ steps.pinned.outputs.pinned }}). Nothing to do."

      - name: Get schema for tracked version
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        run: |
          PINNED="${{ steps.pinned.outputs.pinned }}"
          mkdir -p /tmp/tf-old
          cat > /tmp/tf-old/main.tf <<EOF
          terraform {
            required_providers {
              gcore = { source = "G-Core/gcore", version = "= $PINNED" }
            }
          }
          provider "gcore" { api_key = "dummy" }
          EOF
          cd /tmp/tf-old && terraform init -input=false 2>&1 | tail -5
          terraform providers schema -json > /tmp/schema-old.json
          cp /tmp/schema-old.json "terraform-provider/schemas/gcore-$PINNED.json" 2>/dev/null || true

      - name: Get schema for latest version
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        run: |
          LATEST="${{ steps.provider.outputs.latest }}"
          mkdir -p /tmp/tf-new
          cat > /tmp/tf-new/main.tf <<EOF
          terraform {
            required_providers {
              gcore = { source = "G-Core/gcore", version = "= $LATEST" }
            }
          }
          provider "gcore" { api_key = "dummy" }
          EOF
          cd /tmp/tf-new && terraform init -input=false 2>&1 | tail -5
          terraform providers schema -json > /tmp/schema-new.json
          cp /tmp/schema-new.json "terraform-provider/schemas/gcore-$LATEST.json"

      - name: Rebuild doc index
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        run: python3 .github/scripts/terraform/build_doc_index.py

      - name: Diff schemas
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        id: diff
        run: |
          set +e
          python3 .github/scripts/terraform/diff_schemas.py \
            /tmp/schema-old.json \
            /tmp/schema-new.json \
            terraform-provider/doc_index.json
          EXIT=$?
          if [ $EXIT -eq 1 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif [ $EXIT -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            exit $EXIT
          fi
        env:
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}

      - name: Generate coverage report
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        run: |
          python3 .github/scripts/terraform/report_coverage.py \
            /tmp/schema-new.json \
            terraform-provider/doc_index.json

      - name: Ensure terraform label exists
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "terraform" \
            --repo "$GITHUB_REPOSITORY" \
            --description "Terraform provider or configuration" \
            --color "7B42BC" \
            --force

      - name: Check if issue already open
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[Terraform] Provider updated to v${{ steps.provider.outputs.latest }}"
          EXISTS=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "terraform" \
            --state open \
            --search "$TITLE" \
            --json title \
            | jq -r '.[0].title // empty')
          if [ "$EXISTS" = "$TITLE" ]; then
            echo "Issue already exists. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue with schema diff
        if: |
          steps.provider.outputs.latest != steps.pinned.outputs.pinned &&
          steps.existing.outputs.skip != 'true' &&
          steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_VERSION: ${{ steps.provider.outputs.latest }}
          PINNED_VERSION: ${{ steps.pinned.outputs.pinned }}
          SCHEMA_DIFF: ${{ steps.diff.outputs.schema_diff }}
        run: |
          python3 - <<'PYEOF'
          import os
          latest = os.environ["LATEST_VERSION"]
          pinned = os.environ["PINNED_VERSION"]
          diff   = os.environ["SCHEMA_DIFF"]
          body = (
              "## Terraform provider version drift detected\n\n"
              "The Gcore Terraform provider has a new v2 release.\n\n"
              "| | Version |\n"
              "|---|---|\n"
              f"| Latest release | `{latest}` |\n"
              f"| Last tracked   | `{pinned}` |\n\n"
              "### Schema changes in documented resources\n\n"
              "Each entry lists affected articles. "
              "**REMOVED** entries show only articles that actually use that attribute "
              "(attribute-level index — no false positives).\n\n"
              f"{diff}\n\n"
              "### Action required\n\n"
              f"1. Review the [provider changelog](https://github.com/G-Core/terraform-provider-gcore/releases/tag/v{latest}).\n"
              "2. For each **REMOVED** or **CHANGED** entry above, open the listed articles "
              "and update the HCL examples.\n"
              "3. Run live tests for changed resources.\n"
              f"4. Update `.terraform-provider-version` from `{pinned}` to `{latest}` and commit to close this issue.\n"
          )
          with open("/tmp/issue-body.md", "w") as f:
              f.write(body)
          PYEOF
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "[Terraform] Provider updated to v${LATEST_VERSION}" \
            --label "terraform" \
            --body-file /tmp/issue-body.md

      - name: Commit updated schemas and doc index
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform-provider/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: update Terraform provider schema to v${{ steps.provider.outputs.latest }}"
          git push
