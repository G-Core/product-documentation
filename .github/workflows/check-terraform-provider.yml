name: Check Terraform provider version

on:
  schedule:
    - cron: '0 9 * * *'  # every day at 09:00 UTC
  workflow_dispatch:      # allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get latest v2 provider release
        id: provider
        run: |
          # Fetch all releases and find the latest v2.x (including alpha)
          LATEST=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/G-Core/terraform-provider-gcore/releases?per_page=50" \
            | jq -r '[.[] | select(.tag_name | startswith("v2."))] | sort_by(.published_at) | last | .tag_name // empty')
          if [ -z "$LATEST" ]; then
            echo "Could not fetch latest v2 release tag. Exiting."
            exit 1
          fi
          LATEST="${LATEST#v}"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest v2 provider release: $LATEST"

      - name: Get tracked version from state file
        id: pinned
        run: |
          STATE_FILE=".terraform-provider-version"
          if [ ! -f "$STATE_FILE" ]; then
            echo "State file $STATE_FILE not found. Exiting."
            exit 1
          fi
          PINNED=$(cat "$STATE_FILE" | tr -d '[:space:]')
          if [ -z "$PINNED" ]; then
            echo "State file is empty. Exiting."
            exit 1
          fi
          echo "pinned=$PINNED" >> "$GITHUB_OUTPUT"
          echo "Last tracked version: $PINNED"

      - name: Skip if versions match
        if: steps.provider.outputs.latest == steps.pinned.outputs.pinned
        run: |
          echo "Provider version matches tracked version (${{ steps.pinned.outputs.pinned }}). Nothing to do."

      - name: Get schema for tracked version
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        run: |
          mkdir -p /tmp/tf-old
          cat > /tmp/tf-old/main.tf <<EOF
          terraform {
            required_providers {
              gcore = {
                source  = "G-Core/gcore"
                version = "= ${{ steps.pinned.outputs.pinned }}"
              }
            }
          }
          provider "gcore" { api_key = "dummy" }
          EOF
          cd /tmp/tf-old
          terraform init -input=false 2>&1 | tail -5
          terraform providers schema -json > /tmp/schema-old.json
          echo "Old schema extracted."

      - name: Get schema for latest version
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        run: |
          mkdir -p /tmp/tf-new
          cat > /tmp/tf-new/main.tf <<EOF
          terraform {
            required_providers {
              gcore = {
                source  = "G-Core/gcore"
                version = "= ${{ steps.provider.outputs.latest }}"
              }
            }
          }
          provider "gcore" { api_key = "dummy" }
          EOF
          cd /tmp/tf-new
          terraform init -input=false 2>&1 | tail -5
          terraform providers schema -json > /tmp/schema-new.json
          echo "New schema extracted."

      - name: Build resource-to-article index
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        id: index
        run: |
          python3 << 'PYEOF'
          import os, re, json
          from pathlib import Path

          # Find all MDX files containing gcore_ resource blocks
          resource_to_files = {}
          all_resources = set()

          mdx_dirs = ["cloud", "developer-tools/terraform", "cdn/terraform",
                      "dns/dns-plugins", "edge-ai", "waap"]

          for d in mdx_dirs:
              for mdx in Path(d).rglob("*.mdx"):
                  content = mdx.read_text(encoding="utf-8", errors="ignore")
                  resources = re.findall(r'resource\s+"(gcore_\w+)"', content)
                  for res in set(resources):
                      all_resources.add(res)
                      resource_to_files.setdefault(res, []).append(str(mdx))

          print(f"Unique resources documented: {len(all_resources)}")
          for res, files in sorted(resource_to_files.items()):
              print(f"  {res}: {len(files)} article(s)")

          with open("/tmp/resource_index.json", "w") as f:
              json.dump(resource_to_files, f, indent=2)

          # Also output the full resource list for schema diff
          resources_list = sorted(all_resources)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("resources<<RES_EOF\n")
              f.write(json.dumps(resources_list) + "\n")
              f.write("RES_EOF\n")
          PYEOF

      - name: Diff schemas and map to articles
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        id: diff
        run: |
          python3 << 'PYEOF'
          import json, os

          resources_json = os.environ.get("DOCUMENTED_RESOURCES", "[]")
          documented_resources = json.loads(resources_json)

          with open("/tmp/resource_index.json") as f:
              resource_to_files = json.load(f)

          def get_resources(path):
              with open(path) as f:
                  schema = json.load(f)
              provider_key = list(schema.get("provider_schemas", {}).keys())[0]
              return schema["provider_schemas"][provider_key].get("resource_schemas", {})

          def get_attrs(resource_schema):
              return resource_schema.get("block", {}).get("attributes", {})

          old_resources = get_resources("/tmp/schema-old.json")
          new_resources = get_resources("/tmp/schema-new.json")

          lines = []
          has_changes = False

          for resource in sorted(documented_resources):
              old = old_resources.get(resource)
              new = new_resources.get(resource)
              articles = resource_to_files.get(resource, [])

              resource_lines = []

              if old is None and new is not None:
                  resource_lines.append(f"\n#### `{resource}` — NEW resource")
                  resource_lines.append("This resource is now available in the provider but not yet documented.")
                  has_changes = True
              elif old is not None and new is None:
                  resource_lines.append(f"\n#### `{resource}` — REMOVED from provider")
                  if articles:
                      resource_lines.append(f"**Affects {len(articles)} article(s):** " +
                          ", ".join(f"`{a}`" for a in articles))
                  has_changes = True
              elif old is not None and new is not None:
                  old_attrs = get_attrs(old)
                  new_attrs = get_attrs(new)

                  added   = sorted(set(new_attrs) - set(old_attrs))
                  removed = sorted(set(old_attrs) - set(new_attrs))
                  changed = []

                  for attr in sorted(set(old_attrs) & set(new_attrs)):
                      old_req = old_attrs[attr].get("required", False)
                      new_req = new_attrs[attr].get("required", False)
                      old_opt = old_attrs[attr].get("optional", False)
                      new_opt = new_attrs[attr].get("optional", False)
                      old_type = old_attrs[attr].get("type")
                      new_type = new_attrs[attr].get("type")
                      if old_req != new_req or old_opt != new_opt or old_type != new_type:
                          changed.append(attr)

                  if added or removed or changed:
                      has_changes = True
                      resource_lines.append(f"\n#### `{resource}`")
                      if articles:
                          resource_lines.append(
                              f"**Affects {len(articles)} article(s):** " +
                              ", ".join(f"`{a}`" for a in articles)
                          )
                      for a in added:
                          resource_lines.append(f"- Added attribute `{a}`")
                      for r in removed:
                          resource_lines.append(f"- Removed attribute `{r}`")
                      for c in changed:
                          old_a = old_attrs[c]
                          new_a = new_attrs[c]
                          changes = []
                          if old_a.get("required") != new_a.get("required"):
                              changes.append(f"required: {old_a.get('required')} → {new_a.get('required')}")
                          if old_a.get("optional") != new_a.get("optional"):
                              changes.append(f"optional: {old_a.get('optional')} → {new_a.get('optional')}")
                          if old_a.get("type") != new_a.get("type"):
                              changes.append(f"type: `{old_a.get('type')}` → `{new_a.get('type')}`")
                          resource_lines.append(f"- Changed attribute `{c}`: {'; '.join(changes)}")

              lines.extend(resource_lines)

          if not has_changes:
              lines.append("No schema changes detected in documented resources.")

          output = "\n".join(lines)
          print(output)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("schema_diff<<DIFF_EOF\n")
              f.write(output + "\n")
              f.write("DIFF_EOF\n")
              f.write(f"has_changes={'true' if has_changes else 'false'}\n")
          PYEOF
        env:
          DOCUMENTED_RESOURCES: ${{ steps.index.outputs.resources }}

      - name: Ensure terraform label exists
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "terraform" \
            --repo "$GITHUB_REPOSITORY" \
            --description "Terraform provider or configuration" \
            --color "7B42BC" \
            --force

      - name: Check if issue already open
        if: steps.provider.outputs.latest != steps.pinned.outputs.pinned
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[Terraform] Provider updated to v${{ steps.provider.outputs.latest }}"
          EXISTS=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "terraform" \
            --state open \
            --search "$TITLE" \
            --json title \
            | jq -r '.[0].title // empty')
          if [ "$EXISTS" = "$TITLE" ]; then
            echo "Issue already exists. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue with schema diff
        if: |
          steps.provider.outputs.latest != steps.pinned.outputs.pinned &&
          steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_VERSION: ${{ steps.provider.outputs.latest }}
          PINNED_VERSION: ${{ steps.pinned.outputs.pinned }}
          SCHEMA_DIFF: ${{ steps.diff.outputs.schema_diff }}
        run: |
          python3 - <<'PYEOF'
          import os
          latest = os.environ["LATEST_VERSION"]
          pinned = os.environ["PINNED_VERSION"]
          diff   = os.environ["SCHEMA_DIFF"]
          body = (
              "## Terraform provider version drift detected\n\n"
              "The Gcore Terraform provider has a new v2 release.\n\n"
              "| | Version |\n"
              "|---|---|\n"
              f"| Latest release | `{latest}` |\n"
              f"| Last tracked | `{pinned}` |\n\n"
              "### Schema changes in documented resources\n\n"
              "Each section lists changed attributes and which articles contain HCL examples "
              "for that resource — those articles need to be reviewed and updated.\n\n"
              f"{diff}\n\n"
              "### Action required\n\n"
              f"1. Review the [provider changelog](https://github.com/G-Core/terraform-provider-gcore/releases/tag/v{latest}) for context on each change.\n"
              "2. For each resource above, open the listed articles and update the HCL examples and attribute descriptions.\n"
              "3. Run live tests for each changed resource to confirm examples still work.\n"
              f"4. Update `.terraform-provider-version` from `{pinned}` to `{latest}` and commit to close this issue.\n"
          )
          with open("/tmp/issue-body.md", "w") as f:
              f.write(body)
          PYEOF
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "[Terraform] Provider updated to v${LATEST_VERSION}" \
            --label "terraform" \
            --body-file /tmp/issue-body.md
