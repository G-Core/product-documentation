name: Sync preprod with main

on:
  schedule:
    - cron: '0 4 * * *'  # daily at 04:00 UTC (09:00 UTC+5)
  workflow_dispatch:      # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Push main to preprod
        run: git push origin HEAD:preprod --force
