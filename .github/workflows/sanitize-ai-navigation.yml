name: Sanitize MDX files

on:
  push:
    branches-ignore: ["main"]
    paths: ["**/*.mdx"]

jobs:
  sanitize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix UTF-8 BOM and ai-navigation YAML special characters
        run: |
          python3 - <<'EOF'
          import re, pathlib, sys

          BOM = b"\xef\xbb\xbf"

          root = pathlib.Path(".")
          bom_fixed = []
          yaml_fixed = []
          encoding_errors = []

          for f in root.rglob("*.mdx"):
              raw = f.read_bytes()

              # Strip UTF-8 BOM if present.
              if raw.startswith(BOM):
                  raw = raw[3:]
                  f.write_bytes(raw)
                  bom_fixed.append(str(f))

              try:
                  text = raw.decode("utf-8")
              except UnicodeDecodeError as e:
                  encoding_errors.append((str(f), str(e)))
                  continue

              def fix(m):
                  return "ai-navigation: " + re.sub(r"[:#]", " -", m.group(1))

              new = re.sub(r"^ai-navigation: (.+)$", fix, text, flags=re.MULTILINE)
              if new != text:
                  f.write_text(new, encoding="utf-8")
                  yaml_fixed.append(str(f))

          if encoding_errors:
              print("ERROR: the following .mdx files are not valid UTF-8.", file=sys.stderr)
              print("Most likely cause: file was saved by PowerShell Set-Content without -Encoding UTF8.", file=sys.stderr)
              print("Fix: re-save the file explicitly as UTF-8 (without BOM).", file=sys.stderr)
              for path, detail in encoding_errors:
                  print(f"  {path}: {detail}", file=sys.stderr)
              sys.exit(1)

          if bom_fixed:
              print(f"Stripped UTF-8 BOM from {len(bom_fixed)} files:")
              for name in bom_fixed:
                  print(f"  {name}")

          if yaml_fixed:
              print(f"Fixed ai-navigation YAML in {len(yaml_fixed)} files:")
              for name in yaml_fixed:
                  print(f"  {name}")

          if not bom_fixed and not yaml_fixed:
              print("No issues found.")
          EOF

      - name: Commit fixes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "Nothing to commit" || (
            git add -A
            git commit -m "Auto-fix: strip UTF-8 BOM and sanitize ai-navigation YAML"
            git push
          )
