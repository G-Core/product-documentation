name: Update Terraform doc index

on:
  push:
    branches:
      - main
    paths:
      - '**/*.mdx'
      - '.github/scripts/terraform/build_doc_index.py'

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install -r .github/scripts/terraform/requirements.txt

      - name: Rebuild doc index
        run: python3 .github/scripts/terraform/build_doc_index.py

      - name: Commit updated index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform-provider/doc_index.json
          git diff --cached --quiet && echo "Index unchanged, nothing to commit." && exit 0
          git commit -m "chore: rebuild Terraform doc index"
          git push
