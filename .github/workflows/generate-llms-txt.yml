name: Generate llms.txt files

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate llms.txt files
        run: |
          python scripts/generate_llms_txt.py \
            --repo . \
            --base-url https://docs.gcore.com

      - name: Create Pull Request with llms.txt updates
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: regenerate llms.txt files"
          branch: automated/update-llms-txt
          delete-branch: true
          title: "chore: update llms.txt after navigation changes"
          body: |
            Auto-generated by the Generate llms.txt files workflow.

            Triggered because docs.json (navigation or page structure) changed,
            or the generation script was updated. Regenerates the root llms.txt
            and all per-product llms.txt files to reflect the current structure
            and frontmatter (title, sidebarTitle, ai-navigation).

            Review the diff to confirm the changes look reasonable, then merge.
            The workflow only opens this PR when the regenerated content
            actually differs from what is on main.
          add-paths: |
            llms.txt
            llms-full.txt
            **/llms.txt
