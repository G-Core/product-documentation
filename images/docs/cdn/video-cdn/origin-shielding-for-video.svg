<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Origin shielding request flow for video delivery</title>
  <desc id="desc">Users request video from nearby CDN edges. CDN edges pull uncached video from the shield server. The shield server makes one request to the origin server when content is not already cached.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="origin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25324a"/>
      <stop offset="1" stop-color="#121a2b"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7a1a"/>
      <stop offset="1" stop-color="#ff4c00"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19b8a8"/>
      <stop offset="1" stop-color="#087f78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#183153" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="0">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#4764d9"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="0">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#0f8d86"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="0">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#ff4c00"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="40" width="1200" height="640" rx="22" fill="#ffffff" stroke="#d8e1ef"/>

  <text x="640" y="96" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#172033">Origin shielding for video delivery</text>
  <text x="640" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#526174">Viewers pull video from CDN edges; cache misses stop at the shield before reaching the origin</text>

  <g opacity="0.42">
    <ellipse cx="758" cy="382" rx="176" ry="170" fill="#f2f7ff" stroke="#cbd9ee" stroke-width="2"/>
    <ellipse cx="758" cy="382" rx="112" ry="170" fill="none" stroke="#d8e3f2" stroke-width="1.5"/>
    <ellipse cx="758" cy="382" rx="48" ry="170" fill="none" stroke="#d8e3f2" stroke-width="1.5"/>
    <path d="M 582 382 H 934" stroke="#d8e3f2" stroke-width="1.5"/>
    <path d="M 610 315 H 906" stroke="#d8e3f2" stroke-width="1.5"/>
    <path d="M 610 449 H 906" stroke="#d8e3f2" stroke-width="1.5"/>
    <path d="M 758 212 V 552" stroke="#d8e3f2" stroke-width="1.5"/>
  </g>

  <path d="M 402 355 C 342 355, 304 355, 295 355" fill="none" stroke="#ff4c00" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-orange)"/>
  <text x="322" y="264" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#a33700">one origin request</text>
  <text x="322" y="286" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#6b3b22">only on shield cache miss</text>

  <path d="M 660 272 C 630 270, 606 282, 574 314" fill="none" stroke="#0f8d86" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arrow-teal)"/>
  <path d="M 662 382 C 630 382, 606 376, 574 365" fill="none" stroke="#0f8d86" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arrow-teal)"/>
  <path d="M 660 492 C 630 492, 606 474, 574 416" fill="none" stroke="#0f8d86" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arrow-teal)"/>
  <text x="588" y="246" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f766e">edge cache misses</text>
  <text x="588" y="267" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#315b57">pull from shield</text>

  <path d="M 1010 248 C 930 232, 854 240, 796 272" fill="none" stroke="#4764d9" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <path d="M 1014 382 C 920 374, 846 376, 802 382" fill="none" stroke="#4764d9" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <path d="M 1010 516 C 930 536, 854 525, 796 492" fill="none" stroke="#4764d9" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <text x="920" y="591" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#3346a8">viewer requests</text>
  <text x="920" y="612" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#526174">served by nearby edges</text>

  <g filter="url(#shadow)">
    <rect x="108" y="292" width="128" height="126" rx="18" fill="url(#origin)"/>
    <circle cx="172" cy="355" r="38" fill="#ffffff" opacity="0.94"/>
    <path d="M 160 333 L 198 355 L 160 377 Z" fill="#ff4c00"/>
  </g>
  <text x="172" y="462" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#172033">Origin server</text>
  <text x="172" y="488" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#526174">video source</text>

  <g filter="url(#shadow)">
    <rect x="408" y="276" width="128" height="164" rx="26" fill="url(#shield)"/>
    <path d="M 472 298 L 514 316 V 352 C 514 384 496 406 472 418 C 448 406 430 384 430 352 V 316 Z" fill="#ffffff" opacity="0.94"/>
    <path d="M 472 318 L 494 328 V 352 C 494 369 486 382 472 390 C 458 382 450 369 450 352 V 328 Z" fill="#ff4c00" opacity="0.92"/>
  </g>
  <text x="472" y="486" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#172033">Shield server</text>
  <text x="472" y="512" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#526174">shared cache</text>

  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">
    <g transform="translate(704 272)">
      <circle r="27" fill="url(#edge)"/>
      <rect x="-14" y="-12" width="28" height="24" rx="5" fill="#ffffff" opacity="0.95"/>
    </g>
    <g transform="translate(736 382)">
      <circle r="27" fill="url(#edge)"/>
      <rect x="-14" y="-12" width="28" height="24" rx="5" fill="#ffffff" opacity="0.95"/>
    </g>
    <g transform="translate(704 492)">
      <circle r="27" fill="url(#edge)"/>
      <rect x="-14" y="-12" width="28" height="24" rx="5" fill="#ffffff" opacity="0.95"/>
    </g>
  </g>
  <text x="714" y="580" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#172033">CDN edges</text>
  <text x="714" y="606" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#526174">global cache locations</text>

  <g fill="#4764d9" stroke="#ffffff" stroke-width="3" filter="url(#shadow)">
    <circle cx="1048" cy="214" r="13"/>
    <circle cx="1090" cy="226" r="13"/>
    <circle cx="1132" cy="214" r="13"/>
    <circle cx="1048" cy="348" r="13"/>
    <circle cx="1090" cy="360" r="13"/>
    <circle cx="1132" cy="348" r="13"/>
    <circle cx="1048" cy="482" r="13"/>
    <circle cx="1090" cy="494" r="13"/>
    <circle cx="1132" cy="482" r="13"/>
  </g>
  <g stroke="#4764d9" stroke-width="5" stroke-linecap="round">
    <path d="M 1048 231 V 254"/>
    <path d="M 1090 243 V 266"/>
    <path d="M 1132 231 V 254"/>
    <path d="M 1048 365 V 388"/>
    <path d="M 1090 377 V 400"/>
    <path d="M 1132 365 V 388"/>
    <path d="M 1048 499 V 522"/>
    <path d="M 1090 511 V 534"/>
    <path d="M 1132 499 V 522"/>
  </g>
  <text x="1090" y="580" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#172033">Users</text>
  <text x="1090" y="606" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#526174">large audience</text>
</svg>
