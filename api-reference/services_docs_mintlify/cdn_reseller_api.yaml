          description: Maximum number of secondary hostnames (additional CNAMEs) per CDN resource for reseller's clients.
          example: 10
        logs_uploader_configs_limit:
          type: integer
          description: Maximum number of log shipping configurations per client.
          example: 10
        logs_uploader_policies_limit:
          type: integer
          description: Maximum number of log shipping policies per client.
          example: 10
        logs_uploader_targets_limit:
          type: integer
          description: Maximum number of log shipping targets per client.
          example: 10
        purge_pattern_limit:
          type: integer
          description: Maximum number of patterns per purge request for reseller's clients.
          example: 50
        purge_max_urls_limit:
          type: integer
          description: Maximum number of URLs per purge-by-URL request for reseller's clients.
          example: 100
        purge_request_limit:
          type: string
          description: Rate limit for purge-by-pattern requests for reseller's clients.
          example: 1/m
        purge_by_urls_request_limit:
          type: string
          description: Rate limit for purge-by-URL requests for reseller's clients.
          example: 2/m
        prefetch_pattern_limit:
          type: integer
          description: Maximum number of patterns per prefetch request for reseller's clients.
          example: 100
        prefetch_request_limit:
          type: string
          description: Rate limit for prefetch requests for reseller's clients.
          example: 2/m
    ResellerLogsUploaderConfigListResponse:
      type: array
      items:
        $ref: '#/components/schemas/ResellerLogsUploaderConfigResponse'
    ResellerLogsUploaderConfigResponse:
      allOf:
      - $ref: '#/components/schemas/LogsUploaderConfigResponse'
      - $ref: '#/components/schemas/ResellerLogsUploaderScopingFields'
    ResellerLogsUploaderScopingFields:
      description: |-
        Reseller-specific scoping fields. `for_all_clients` (sub-clients only) and
        `for_all_resources` (tech-client only) cover orthogonal scopes and can be
        combined. Only `for_all_clients` ↔ `clients` and `for_all_resources` ↔ `resources`
        are mutually exclusive.
      type: object
      properties:
        for_all_clients:
          type: boolean
          description: |-
            If set to true, the config will be applied to all resources of every
            sub-client under the reseller. Resources owned directly by the reseller's
            own tech-client are not matched — use `for_all_resources` (additionally or
            instead) to cover the tech-client's resources.
            Mutually exclusive with `clients`.
        clients:
          type: array
          items:
            type: integer
          description: |-
            List of sub-client IDs to which the config should be applied.
            Mutually exclusive with `for_all_clients`.
    ResellerLogsUploaderScopingFieldsWrite:
      allOf:
      - $ref: '#/components/schemas/ResellerLogsUploaderScopingFields'
      - type: object
        properties:
          for_all_clients:
            default: false
