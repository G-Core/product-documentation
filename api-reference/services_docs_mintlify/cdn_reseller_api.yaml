openapi: 3.1.0
info:
  title: Gcore OpenAPI – CDN Reseller API
  version: '2026-06-02T13:07:47.238598+00:00'
  description: This OpenAPI is an aggregated OpenAPI specification that unifies all Gcore products into a single file. It covers Cloud, CDN, DNS, WAAP, DDoS Protection, Object Storage, Streaming, and FastEdge services.
servers:
- url: https://api.gcore.com
tags:
- name: Account
  description: Information about CDN product settings in your account.
- name: CDN service
  description: Information about the current state of CDN service in your account.
- name: Features
  description: Information about free and paid features available for you account.
- name: Balancer
  description: |-
    Balancer allows choosing CDN server locations that will be used for content delivery.

    To activate balancer, [set client’s balancer settings](/docs/api-reference/cdn-resellers/balancer/set-client-balancer-settings).
- name: CDN activity logs
  description: |-
    Get the history of users requests to CDN.
    It contains requests made both via the API and via the control panel.

    The following methods are not tracked in the activity logs:
    - HEAD
    - OPTIONS
- name: Logs uploader
  description: Manage logs uploader configs for reseller accounts.
- name: Statistics
  description: Statistics CDN usage and paid features usage.
- name: Origin shielding
  description: |-
    Origin shielding helps protect your origin server from being overloaded with requests from multiple CDN servers.
    The option accumulates all CDN server requests at a special server called a shield or precache server.

    When shielding is enabled, only one precache server communicates with the origin host, not the entire CDN.
paths:
  /cdn/resellers/me:
    get:
      operationId: get-account-settings
      tags:
      - Account
      summary: Get account settings
      description: Get information about CDN product settings in your account.
      responses:
        '200':
          $ref: '#/components/responses/ResellersMe'
    put:
      operationId: change-account-settings
      tags:
      - Account
      summary: Change account settings
      description: Change the CDN service settings in your account.
      requestBody:
        $ref: '#/components/requestBodies/ChangeResellersAccountDetails'
      responses:
        '200':
          $ref: '#/components/responses/ResellersMe'
        '400':
          $ref: '#/components/responses/ChangeResellersAccountDetailsFailed'
  /cdn/resellers/me/limits:
    get:
      operationId: get-account-default-limits
      tags:
      - Account
      summary: Get account default limits
      description: Get the effective default quota limits applied to new clients created under this reseller.
      responses:
        '200':
          description: Successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResellerDefaultLimitsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /cdn/clients:
    get:
      operationId: get-cdn-service
      tags:
      - CDN service
      summary: Get CDN service
      description: Get information about CDN services of all clients accounts.
      responses:
        '200':
          $ref: '#/components/responses/AccountsList'
  /cdn/clients/{client_id}:
    get:
      operationId: get-cdn-service-details
      tags:
      - CDN service
      summary: Get CDN service details
      description: Get information about CDN service of the specific client account.
      parameters:
      - $ref: '#/components/parameters/path_client_id'
      responses:
        '200':
          $ref: '#/components/responses/AccountDetails'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: change-cdn-service-details
      tags:
      - CDN service
      summary: Change CDN service details
      description: Change CDN service details of the specific client account.
      parameters:
      - $ref: '#/components/parameters/path_client_id'
      requestBody:
        $ref: '#/components/requestBodies/ChangeAccountDetails'
      responses:
        '200':
          $ref: '#/components/responses/AccountDetails'
        '400':
          $ref: '#/components/responses/ChangeAccountDetailsFailed'
        '404':
          $ref: '#/components/responses/NotFound'
  /cdn/clients/{client_id}/service:
    get:
      operationId: get-cdn-service-status-details
      tags:
      - CDN service
      summary: Get CDN service status details
      description: Get information about CDN service status of the specific client account.
      parameters:
      - $ref: '#/components/parameters/path_client_id'
      responses:
        '200':
          $ref: '#/components/responses/ServiceDetails'
        '404':
          $ref: '#/components/responses/NotFound'
  /cdn/clients/{client_id}/features:
    get:
      operationId: get-cdn-features-details
      tags:
      - CDN service
      summary: Get CDN features details
      description: Get information about CDN features available in the specific client account.
      parameters:
      - $ref: '#/components/parameters/path_client_id'
      responses:
        '200':
          $ref: '#/components/responses/Features'
        '404':
          $ref: '#/components/responses/NotFound'
  /cdn/clients/{client_id}/limits:
    get:
      operationId: get-cdn-limits-details
      tags:
      - CDN service
      summary: Get CDN limits details
      description: Get information about CDN limits for the specific client account.
      parameters:
      - $ref: '#/components/parameters/path_client_id'
      responses:
        '200':
          description: Successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientsMeLimitsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /cdn/admin/feature:
    get:
      operationId: get-features-list
      tags:
      - Features
      summary: Get features list
      description: Get information about all available features that you can manage.
      responses:
        '200':
          $ref: '#/components/responses/FeaturesList'
  /cdn/admin/feature/{feature_id}:
    get:
      operationId: get-feature-details
      tags:
      - Features
      summary: Get feature details
      description: Get information about the feature details.
      parameters:
      - $ref: '#/components/parameters/path_feature_id'
      responses:
        '200':
          $ref: '#/components/responses/FeaturesDetail'
        '404':
          $ref: '#/components/responses/FeatureNotFound'
  /cdn/admin/paid_features:
    get:
      operationId: get-paid-features-list
      tags:
      - Features
      summary: Get paid features list
      description: Get information about all paid features activated for the clients.
      responses:
        '200':
          $ref: '#/components/responses/PaidFeaturesList'
    post:
      operationId: enable-paid-feature
      tags:
      - Features
      summary: Enable paid feature
      description: Enable information about the paid feature for a specific client.
      requestBody:
        $ref: '#/components/requestBodies/PaidFeaturesCreate'
      responses:
        '201':
          $ref: '#/components/responses/PaidFeaturesCreated'
        '400':
          $ref: '#/components/responses/FeatureValidationError'
  /cdn/admin/paid_features/{paid_feature_id}:
    get:
      operationId: get-paid-feature-details
      tags:
      - Features
      summary: Get paid feature details
      description: Get details of the activated paid feature.
      parameters:
      - $ref: '#/components/parameters/path_paid_feature_id'
      responses:
        '200':
          $ref: '#/components/responses/PaidFeaturesDetail'
        '404':
          $ref: '#/components/responses/PaidFeatureNotFound'
    delete:
      operationId: disable-paid-feature
      tags:
      - Features
      summary: Disable paid feature
      description: Disable the paid feature for a specific client.
      parameters:
      - $ref: '#/components/parameters/path_paid_feature_id'
      responses:
        '204':
          description: Successful.
        '404':
          $ref: '#/components/responses/PaidFeatureNotFound'
  /cdn/admin/free_features:
    get:
      operationId: get-free-features-list
      tags:
      - Features
      summary: Get free features list
      description: Get information about all free features activated for the clients.
      responses:
        '200':
          $ref: '#/components/responses/FreeFeaturesList'
    post:
      operationId: enable-free-feature
      tags:
      - Features
      summary: Enable free feature
      description: Enable the free feature for a specific client.
      requestBody:
        $ref: '#/components/requestBodies/PaidFeaturesCreate'
      responses:
        '201':
          $ref: '#/components/responses/FreeFeaturesCreated'
        '400':
          $ref: '#/components/responses/FeatureValidationError'
  /cdn/admin/free_features/{free_feature_id}:
    get:
      operationId: get-free-feature-details
      tags:
      - Features
      summary: Get free feature details
      description: Get information about the details of the activated free feature.
      parameters:
      - $ref: '#/components/parameters/path_free_feature_id'
      responses:
        '200':
          $ref: '#/components/responses/FreeFeaturesDetail'
        '404':
          $ref: '#/components/responses/FreeFeatureNotFound'
    delete:
      operationId: disable-free-feature
      tags:
      - Features
      summary: Disable free feature
      description: Disable the free feature for a specific client.
      parameters:
      - $ref: '#/components/parameters/path_free_feature_id'
      responses:
        '204':
          description: Successful.
        '404':
          $ref: '#/components/responses/FreeFeatureNotFound'
  /cdn/admin/billing_regions:
    get:
      operationId: get-client-content-delivery-regions-list
      tags:
      - Balancer
      summary: Get client content delivery regions list
      description: Get information about all regions that might be used for content delivery for a specific client.
      parameters:
      - $ref: '#/components/parameters/query_client_id'
      responses:
        '200':
          $ref: '#/components/responses/BillingRegionsList'
        '400':
          $ref: '#/components/responses/NotFound'
  /cdn/admin/clients:
    get:
      operationId: get-clients-using-balancer
      tags:
      - Balancer
      summary: Get clients using balancer
      description: Get IDs of clients that use the load balancer.
      responses:
        '200':
          $ref: '#/components/responses/ClientsThatUseBalancer'
  /cdn/admin/clients/{client_id}:
    get:
      operationId: get-client-balancer-settings
      tags:
      - Balancer
      summary: Get client balancer settings
      description: Get information about all regions used for content delivery for a specific client.
      parameters:
      - $ref: '#/components/parameters/path_client_id'
      responses:
        '200':
          $ref: '#/components/responses/ClientBalancerSettingsDetails'
        '404':
          $ref: '#/components/responses/UnableReceiveSettings'
    post:
      operationId: set-client-balancer-settings
      tags:
      - Balancer
      summary: Set client balancer settings
      description: Set regions that will be used for content delivery for a specific client.
      parameters:
      - $ref: '#/components/parameters/path_client_id'
      requestBody:
        $ref: '#/components/requestBodies/SetClientsBalancerSettings'
      responses:
        '204':
          description: Successful.
        '400':
          $ref: '#/components/responses/RegionNotFound'
        '409':
          $ref: '#/components/responses/RegionIsAbsent'
    delete:
      operationId: delete-client-balancer-settings
      tags:
      - Balancer
      summary: Delete client balancer settings
      description: Delete balancer settings for a specific client. Balancer will be deactivated.
      parameters:
      - $ref: '#/components/parameters/path_client_id'
      responses:
        '204':
          description: Successful.
        '404':
          $ref: '#/components/responses/NotFound'
  /cdn/admin/default_region:
    get:
      operationId: get-client-default-location-handler
      tags:
      - Balancer
      summary: Get client default location handler
      description: |-
        Get the default location handler that is used to redirect traffic from locations that are not used in content delivery and
        to deliver content when the user region has not been defined.
      parameters:
      - $ref: '#/components/parameters/query_client_id_required'
      responses:
        '200':
          $ref: '#/components/responses/DefaultLocationHandler'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: set-client-default-location-handler
      tags:
      - Balancer
      summary: Set client default location handler
      description: |-
        Set the default location handler that will be used to redirect traffic from locations not used in content
        delivery and to deliver content when the user's region has not been defined.

        The location must be included in the list of regions used for content delivery.
      requestBody:
        $ref: '#/components/requestBodies/SetDefaultHandler'
      responses:
        '204':
          description: Successful.
        '400':
          $ref: '#/components/responses/DefaultHandlerError'
  /cdn/activity_log/requests:
    get:
      operationId: get-activity-logs
      tags:
      - CDN activity logs
      summary: Get CDN activity logs
      description: Get information about all CDN activity logs records.
      parameters:
      - $ref: '#/components/parameters/path'
      - $ref: '#/components/parameters/user_id'
      - $ref: '#/components/parameters/token_id'
      - $ref: '#/components/parameters/client_id'
      - $ref: '#/components/parameters/method'
      - $ref: '#/components/parameters/min_requested_at'
      - $ref: '#/components/parameters/max_requested_at'
      - $ref: '#/components/parameters/remote_ip_address'
      - $ref: '#/components/parameters/status_code'
      - $ref: '#/components/parameters/limit'
      - $ref: '#/components/parameters/offset'
      responses:
        '200':
          $ref: '#/components/responses/List'
        '401':
          description: Authentication credentials were not provided or the given token is not valid for any token type.
  /cdn/activity_log/requests/{log_id}:
    get:
      operationId: get-activity-logs-details
      tags:
      - CDN activity logs
      summary: Get CDN activity logs details
      description: Get information about CDN activity logs record.
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Details'
        '401':
          description: Authentication credentials were not provided or the given token is not valid for any token type.
        '404':
          description: Activity logs record is not found.
  /cdn/logs_uploader/configs:
    get:
      operationId: reseller-get-configs-list
      tags:
      - Logs uploader
      summary: Get configs list
      description: |-
        Get list of logs uploader configs.

        Reseller configs have two additional scoping fields not present in the
        client-level API:

        - `for_all_clients` — apply the config to every sub-client under the reseller
        (does not match resources owned directly by the reseller's own tech-client).
        - `clients` — apply the config to a specific list of sub-client IDs.

        `for_all_clients` (sub-clients only) and `for_all_resources` (tech-client only)
        cover orthogonal scopes and can be combined. Only `for_all_clients` ↔ `clients`
        and `for_all_resources` ↔ `resources` are mutually exclusive.

        For **policies**, **targets**, **regions**, and all other Logs uploader
        endpoints shared with clients, refer to the
        [client-level Logs uploader documentation](/docs/api-reference/cdn/logs-uploader).
      parameters:
      - in: query
        name: search
        schema:
          type: string
        description: Search by config name or id.
      - in: query
        name: resource_ids
        schema:
          type: array
          items:
            type: integer
        description: Filter by ids of CDN resources that are assigned to given config.
      responses:
        '200':
          description: Successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResellerLogsUploaderConfigListResponse'
        '403':
          description: Feature is disabled for your account.
    post:
      operationId: reseller-create-config
      tags:
      - Logs uploader
      summary: Create config
      description: |-
        Create logs uploader config.

        Reseller configs support additional scoping fields (`for_all_clients`, `clients`).
        `for_all_clients` covers all sub-clients only; `for_all_resources` covers the
        reseller's own tech-client only. The two flags can be combined to cover both.
        Only `for_all_clients` ↔ `clients` and `for_all_resources` ↔ `resources` are
        mutually exclusive.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResellerLogsUploaderConfig'
      responses:
        '201':
          description: Successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResellerLogsUploaderConfigResponse'
        '400':
          description: You will receive an error with the invalid parameter mentioned.
        '403':
          description: Feature is disabled for your account.
  /cdn/logs_uploader/configs/{id}:
    get:
      operationId: reseller-get-config-details
      tags:
      - Logs uploader
      summary: Get config details
      description: Get information about logs uploader config.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResellerLogsUploaderConfigResponse'
        '403':
          description: Feature is disabled for your account.
        '404':
          description: Logs uploader config does not exist or has been deleted.
    put:
      operationId: reseller-change-config
      tags:
      - Logs uploader
      summary: Change config
      description: Change logs uploader config.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResellerLogsUploaderConfig'
      responses:
        '200':
          description: Successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResellerLogsUploaderConfigResponse'
        '400':
          description: You will receive an error with the invalid parameter mentioned.
        '403':
          description: Feature is disabled for your account.
        '404':
          description: Logs uploader config does not exist or has been deleted.
    patch:
      operationId: reseller-patch-config
      tags:
      - Logs uploader
      summary: Change config
      description: Change logs uploader config partially.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchResellerLogsUploaderConfig'
      responses:
        '200':
          description: Successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResellerLogsUploaderConfigResponse'
        '400':
          description: You will receive an error with the invalid parameter mentioned.
        '403':
          description: Feature is disabled for your account.
        '404':
          description: Logs uploader config does not exist or has been deleted.
    delete:
      operationId: reseller-delete-config
      tags:
      - Logs uploader
      summary: Delete config
      description: |-
        Delete the logs uploader config from the system permanently.

        Notes:
        - **Irreversibility**: This action is irreversible. Once deleted, the logs uploader config cannot be recovered.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '204':
          description: Successful.
        '403':
          description: Feature is disabled for your account.
        '404':
          description: Logs uploader config does not exist or has been deleted.
  /cdn/statistics/series:
    get:
      operationId: cdn-resource-statistics
      tags:
      - Statistics
      summary: CDN resource statistics
      description: Get information about CDN resource statistics for up to 365 days starting today.
      parameters:
      - $ref: '#/components/parameters/query_statistics_Service'
      - $ref: '#/components/parameters/query_statistics_From'
      - $ref: '#/components/parameters/query_statistics_To'
      - $ref: '#/components/parameters/query_statistics_Granularity'
      - $ref: '#/components/parameters/query_statistics_MetricsSeries'
      - $ref: '#/components/parameters/query_statistics_GroupByTraffic'
      - $ref: '#/components/parameters/query_statistics_Countries'
      - $ref: '#/components/parameters/query_statistics_Regions'
      - $ref: '#/components/parameters/query_statistics_Resource'
      - $ref: '#/components/parameters/query_statistics_Client'
      responses:
        '200':
          $ref: '#/components/responses/StatisticsTrafficSeries'
        '204':
          description: There is no data for the requested time period.
  /cdn/statistics/aggregate/stats:
    get:
      operationId: aggregated-statistics
      tags:
      - Statistics
      summary: Aggregated statistics
      description: |-
        Get information about monthly CDN traffic data.

        Request URL parameters should be added as a query string after the endpoint.
      parameters:
      - $ref: '#/components/parameters/query_statistics_Service'
      - $ref: '#/components/parameters/query_statistics_From'
      - $ref: '#/components/parameters/query_statistics_To'
      - $ref: '#/components/parameters/query_statistics_Granularity'
      - $ref: '#/components/parameters/query_statistics_MetricsAggregated'
      - $ref: '#/components/parameters/query_statistics_GroupByTraffic'
      - $ref: '#/components/parameters/query_statistics_Countries'
      - $ref: '#/components/parameters/query_statistics_Regions'
      - $ref: '#/components/parameters/query_statistics_Resource'
      - $ref: '#/components/parameters/query_statistics_Client'
      responses:
        '200':
          $ref: '#/components/responses/StatisticsTrafficAggregated'
        '204':
          description: There is no data for the requested time period.
  /cdn/statistics/shield_usage/series:
    get:
      operationId: origin-shielding-usage-statistics
      tags:
      - Statistics
      summary: Origin shielding usage statistics
      description: |-
        Get information about the origin shielding usage statistics for up to 365 days starting today.

        Request URL parameters should be added as a query string after the endpoint.
      parameters:
      - $ref: '#/components/parameters/query_statistics_From'
      - $ref: '#/components/parameters/query_statistics_To'
      - $ref: '#/components/parameters/query_statistics_Resource'
      - $ref: '#/components/parameters/query_statistics_Client'
      responses:
        '200':
          $ref: '#/components/responses/StatisticsPaidFeaturesSeries'
        '204':
          description: There is no data for the requested time period.
  /cdn/statistics/shield_usage/aggregated:
    get:
      operationId: aggregated-origin-shielding-usage-statistics
      tags:
      - Statistics
      summary: Aggregated origin shielding usage statistics
      description: |-
        Get the number of CDN resources that used origin shielding.

        Request URL parameters should be added as a query string after the endpoint.
      parameters:
      - $ref: '#/components/parameters/query_statistics_From'
      - $ref: '#/components/parameters/query_statistics_To'
      - $ref: '#/components/parameters/query_statistics_GroupByPaidFeatures'
      - $ref: '#/components/parameters/query_statistics_Resource'
      - $ref: '#/components/parameters/query_statistics_Client'
      - $ref: '#/components/parameters/query_statistics_Flat'
      responses:
        '200':
          $ref: '#/components/responses/StatisticsPaidFeaturesAggregatedShieldUsage'
        '204':
          description: There is no data for the requested time period.
  /cdn/statistics/raw_logs_usage/series:
    get:
      operationId: raw-logs-usage-statistics
      tags:
      - Statistics
      summary: Logs uploader usage statistics
      description: |-
        Get information about Logs uploader usage statistics for up to 90 days starting today.

        Request URL parameters should be added as a query string after the endpoint.
      parameters:
      - $ref: '#/components/parameters/query_statistics_From'
      - $ref: '#/components/parameters/query_statistics_To'
      - $ref: '#/components/parameters/query_statistics_Resource'
      - $ref: '#/components/parameters/query_statistics_Client'
      responses:
        '200':
          $ref: '#/components/responses/StatisticsPaidFeaturesSeries'
        '204':
          description: No data for the requested time period.
  /cdn/statistics/raw_logs_usage/aggregated:
    get:
      operationId: aggregated-raw-logs-usage-statistics
      tags:
      - Statistics
      summary: Aggregated Logs uploader usage statistics
      description: |-
        Get the number of CDN resources that used Logs uploader.

        Request URL parameters should be added as a query string after the endpoint.
      parameters:
      - $ref: '#/components/parameters/query_statistics_From'
      - $ref: '#/components/parameters/query_statistics_To'
      - $ref: '#/components/parameters/query_statistics_GroupByPaidFeatures'
      - $ref: '#/components/parameters/query_statistics_Resource'
      - $ref: '#/components/parameters/query_statistics_Client'
      - $ref: '#/components/parameters/query_statistics_Flat'
      responses:
        '200':
          $ref: '#/components/responses/StatisticsPaidFeaturesAggregatedRawLogsUsage'
        '204':
          description: There is no data for the requested time period.
  /cdn/clients/{client_id}/disabled_shield_locations_v2:
    get:
      operationId: get-information-about-disabled-origin-shielding-locations
      tags:
      - Origin shielding
      summary: Get information about disabled origin shielding locations
      description: Get information about origin shielding locations disabled for a specific client.
      parameters:
      - $ref: '#/components/parameters/path_client_id'
      responses:
        '200':
          $ref: '#/components/responses/DisabledShieldLocations'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  responses:
    AccountDetails:
      description: Successful.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AccountDetails'
          examples:
            default:
              $ref: '#/components/examples/AccountDetails'
    AccountsList:
      description: Successful.
      content:
        application/json:
