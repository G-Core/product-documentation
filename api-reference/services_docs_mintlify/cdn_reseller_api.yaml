    UnacceptableHandler:
      description: The specified region is not allowed as the default location handler.
      type: object
      properties:
        error:
          type: string
          description: |-
            The specified region is not allowed as the default location handler.

            To get the list of allowed regions, use [Get client content delivery regions list](/docs/api-reference/cdn-resellers/balancer/get-client-content-delivery-regions-list).
          example: unacceptable handler
    UpdateResellerMeDetails:
      type: object
      properties:
        default_enabled_features:
          allOf:
          - $ref: '#/components/schemas/body_request_resellers_DefaultEnabledFeatures'
    UpdateResellerMeDetailsFailed:
      description: Invalid value of "default_enabled_features" parameter is provided.
      type: object
      properties:
        errors:
          type: object
          properties:
            default_enabled_features:
              type: array
              description: |-
                List of paid features IDs that you cannot manage.

                To get information about available features, use [Get account settings](/docs/api-reference/cdn-resellers/account/get-account-settings) section.
              items:
                type: string
              example:
              - 'You have no permission to manage these features: [4]. Use only these: [1, 2, 3].'
    UserID:
      type: integer
      description: ID of the user who made the request.
    body_request_balancer_DefaultNameHandler:
      type: string
      description: |-
        Region name.

        [Get the client default location handler](/docs/api-reference/cdn-resellers/balancer/get-client-default-location-handler) to learn more about regions that can be used as the default location handler.
    body_request_clients_UtilizationLevel:
      type: integer
      description: |-
        CDN traffic usage limit in gigabytes.

        The value must be greater than or equal to 0.

        When the limit is reached, we will send an email notification to the client.
    body_request_resellers_DefaultEnabledFeatures:
      type: array
      items:
        type: integer
      description: |-
        Paid features IDs that will be enabled for new clients created after the field value is specified.

        The list must contain available features only.
    body_response_balancer_billing_regions_ChangedAt:
      type: string
      description: Date of the last update of the information about the region.
    body_response_balancer_billing_regions_CreatedAt:
      type: string
      description: Date of region creation.
    body_response_balancer_billing_regions_Description:
      type: string
      description: Region full name.
    body_response_balancer_billing_regions_ID:
      type: integer
      description: Region ID.
    body_response_balancer_billing_regions_Localization:
      description: Region full name translated into different languages.
      type: array
      items:
        type: object
      nullable: true
    body_response_balancer_billing_regions_Name:
      type: string
      description: Region abbreviation.
    body_response_balancer_billing_regions_Required:
      type: boolean
      description: |-
        Defines whether the region is the default location handler or not.

        Default location handler cannot be excluded from the content delivery.

        Possible values:
        - **true** - Region is the default location handler.
        - **false** - Region is not the default location handler.
    body_response_balancer_default_handler_CurrentHandler:
      type: string
      description: Name of the region used as the default location handler.
    body_response_balancer_default_handler_PossibleHandlers:
      type: array
      items:
        type: string
      description: Names of regions that can be used as the default location handler.
    body_response_balancer_regions_settings_IsIn:
      type: boolean
      description: |-
        Defines whether regions are used for content delivery for a client or not.

        Possible values:
        - **true** - Region is used for content delivery.
        - **false** - Region is not used for content delivery.
    body_response_balancer_regions_settings_RegionList:
      type: array
      items:
        type: integer
      description: |-
        List of region IDs.

        If you specified regions used for content delivery, the regions IDs list must not contain the ID of the default location handler region.

        If you specified regions not used for content delivery, the regions IDs list must contain the ID of the default location handler region.
    body_response_client_AutoSuspendEnabled:
      type: boolean
      description: Defines whether resources will be deactivated automatically by inactivity.
      example: true
    body_response_client_Cname:
      type: string
      description: Domain zone to which a CNAME record of the client CDN resources should be pointed.
    body_response_client_Created:
      type: string
      description: Date of the first synchronization with the Platform.
    body_response_client_DisabledShieldLocationsV2:
      type: array
      items:
        type: integer
      description: Origin shielding location IDs disabled for the client.
      example:
      - 1
      - 2
      - 3
    body_response_client_ID:
      type: integer
      description: Client account ID.
    body_response_client_Service:
      type: object
      description: CDN service status.
      properties:
        enabled:
          allOf:
          - $ref: '#/components/schemas/body_response_service_Enabled'
        status:
          allOf:
          - $ref: '#/components/schemas/body_response_service_Status'
        updated:
          allOf:
          - $ref: '#/components/schemas/body_response_service_Updated'
    body_response_client_Updated:
      type: string
      description: Date of the last CDN service update.
    body_response_client_UseBalancer:
      type: boolean
      description: Defines whether custom balancing is used for content delivery.
    body_response_client_UtilizationLevel:
      type: integer
      description: |-
        CDN traffic usage limit in gigabytes.

        When the limit is reached, we will send an email notification to a client.
    body_response_features_ID:
      type: integer
      description: Feature ID.
    body_response_features_IsFree:
      type: boolean
      description: |-
        Defines whether a feature is free or paid.

        Possible values:
        - **true** - Feature is free.
        - **false** - Feature is paid.
    body_response_features_Name:
      type: string
      description: Feature name.
    body_response_paid_features_CreateDate:
      type: string
      format: date-time
      description: Date and time when the feature was activated (ISO 8601/RFC 3339 format, UTC.)
    body_response_paid_features_ID:
      type: integer
      description: Internal feature activation ID.
    body_response_reseller_AvailableFeatures:
      type: array
      description: IDs of paid features that you can manage for your clients accounts.
      items:
        $ref: '#/components/schemas/body_response_features_ID'
    body_response_reseller_DefaultEnabledFeatures:
      type: array
      description: IDs of paid features that will be enabled for new clients.
      items:
        $ref: '#/components/schemas/body_response_features_ID'
    body_response_reseller_ID:
      type: integer
      description: Reseller account ID.
    body_response_service_Enabled:
      type: boolean
      description: |-
        Defines whether the service is activated.

        Possible values are:
        - **true** - Service is activated.
        - **false** - Service is not activated.
    body_response_service_Status:
      type: string
      description: |-
        Service status.

        Possible values:
        - **new** - CDN service is not activated.
        - **trial** - Free trial is in progress.
        - **trialend** - Free trial has ended and CDN service is stopped. All client CDN resources are suspended.
        - **activating** - CDN service is being activated. It can take up to 15 minutes.
        - **active** - CDN service is active.
        - **paused** - CDN service is stopped. All client CDN resources are suspended.
        - **deleted** - CDN service is stopped. All client CDN resources are deleted.
    body_response_service_Updated:
      type: string
      description: Date of the last status update.
    body_response_statistics_95Percentile:
      type: integer
      description: 95 percentile bandwidth value.
    body_response_statistics_ActiveFrom:
      type: string
      description: Date and time when paid feature was enabled (ISO 8601/RFC 3339 format, UTC.)
    body_response_statistics_ActiveTo:
      type: string
      nullable: true
      description: |-
        Date and time when paid feature was disabled (ISO 8601/RFC 3339 format, UTC.)

        Returns **null** if the paid feature is enabled.
    body_response_statistics_CacheHitTrafficRatio:
      type: integer
      description: 'Formula: 1 - `upstream_bytes` / `sent_bytes`. We deduct the non-cached traffic from the total traffic amount.'
    body_response_statistics_Client:
      type: object
      description: Statistics information grouped by client accounts IDs.
    body_response_statistics_Cname:
      type: string
      description: CDN resource CNAME.
    body_response_statistics_ID:
      type: integer
      description: Internal feature activation ID.
    body_response_statistics_MaxBandwidth:
      type: integer
      description: Maximum bandwidth.
    body_response_statistics_Metrics:
      type: object
      description: Statistics parameters.
    body_response_statistics_MinBandwidth:
      type: integer
      description: Minimum bandwidth.
    body_response_statistics_RawLogsUsage:
      type: string
      description: Number of CDN resources that used Logs uploader.
    body_response_statistics_RegionAggregated:
      type: object
      description: Statistics information grouped by regions.
    body_response_statistics_RegionSeries:
      type: object
      description: |-
        Regions for which data is displayed.

        Possible values:
        - **asia** - Asia
        - **au** - Australia
        - **cis** - CIS (Commonwealth of Independent States)
        - **eu** - Europe
        - **latam** - Latin America
        - **me** - Middle East
        - **na** - North America.
        - **africa** - Africa
        - **sa** - South America
    body_response_statistics_Requests:
      type: integer
      description: Number of requests to edge servers.
    body_response_statistics_Resource:
      type: object
      description: Statistics information grouped by CDN resources.
    body_response_statistics_Responses2xx:
      type: integer
      description: Number of 2xx response codes.
    body_response_statistics_Responses3xx:
      type: integer
      description: Number of 3xx response codes.
    body_response_statistics_Responses4xx:
      type: integer
      description: Number of 4xx response codes.
    body_response_statistics_Responses5xx:
      type: integer
      description: Number of 5xx response codes.
    body_response_statistics_ResponsesHit:
      type: integer
      description: 'Number of responses with the header Cache: HIT.'
    body_response_statistics_ResponsesMiss:
      type: integer
      description: 'Number of responses with the header Cache: MISS.'
    body_response_statistics_SentBytesAggregated:
      type: integer
      description: Traffic in bytes from CDN servers to clients.
    body_response_statistics_SentBytesSeries:
      type: array
      items:
        type: integer
      description: |-
        Bytes from CDN servers to the end-users.

        Represented by two values, for example:
        - 1543622400 - time in the UNIX timestamp when statistics were received.
        - 17329220573 - bytes.
    body_response_statistics_ShieldUsage:
      type: string
      description: Number of CDN resources that used origin shielding.
    body_response_statistics_TotalBytesAggregated:
      type: integer
      description: Upstream bytes and `sent_bytes` combined.
    body_response_statistics_TotalBytesSeries:
      type: array
      items:
        type: integer
      description: |-
        Upstream bytes and `sent_bytes` combined.

        Represented by two values, for example:
        - 1543622400 - time in the UNIX timestamp when statistics were received.
        - 17329220573 - bytes.
    body_response_statistics_UpstreamBytesAggregated:
      type: integer
      description: Traffic in bytes from the upstream to CDN servers.
    body_response_statistics_UpstreamBytesSeries:
      type: array
      items:
        type: integer
      description: |-
        Bytes from the upstream to the CDN servers.

        Represented by two values, for example:
        - 1543622400 - time in the UNIX timestamp when statistics were received.
        - 17329220573 - bytes.
  parameters:
    ID:
      name: log_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    client_id:
      name: client_id
      in: query
      schema:
        type: integer
      description: Client ID.
    limit:
      name: limit
      in: query
      schema:
        type: integer
      description: Maximum number of items in response.
    max_requested_at:
      name: max_requested_at
      in: query
      schema:
        type: string
      description: |-
        End of the requested time period (ISO 8601/RFC 3339 format, UTC.)

        You can specify a date with a time separated by a space, or just a date.

        Examples:
        - &`max_requested_at`=2021-05-05 12:00:00
        - &`max_requested_at`=2021-05-05
    method:
      name: method
      in: query
      schema:
        type: string
      description: |-
        HTTP method type of requests.

        Use upper case only.

        Example:
        - ?method=DELETE
    min_requested_at:
      name: min_requested_at
      in: query
      schema:
        type: string
      description: |-
        Beginning of the requested time period (ISO 8601/RFC 3339 format, UTC.)

        You can specify a date with a time separated by a space, or just a date.

        Examples:
        - &`min_requested_at`=2021-05-05 12:00:00
        - &`min_requested_at`=2021-05-05
    offset:
      name: offset
      in: query
      schema:
        type: integer
      description: Offset relative to the beginning of activity logs.
    path:
      name: path
      in: query
      schema:
        type: string
      description: Exact URL path.
    path_client_id:
      name: client_id
      in: path
      required: true
      schema:
        allOf:
        - $ref: '#/components/schemas/body_response_client_ID'
    path_feature_id:
      name: feature_id
      in: path
      required: true
      schema:
        allOf:
        - $ref: '#/components/schemas/body_response_features_ID'
    path_free_feature_id:
      name: free_feature_id
      in: path
      required: true
      schema:
        allOf:
        - $ref: '#/components/schemas/body_response_paid_features_ID'
    path_paid_feature_id:
      name: paid_feature_id
      in: path
      required: true
      schema:
        allOf:
        - $ref: '#/components/schemas/body_response_paid_features_ID'
    query_client_id:
      name: client_id
      in: query
      schema:
        type: integer
      description: Client account ID.
    query_client_id_required:
      required: true
      name: client_id
      in: query
      schema:
        type: integer
      description: Client account ID.
    query_statistics_Client:
      in: query
      name: client
      schema:
        type: integer
      description: |-
        Client accounts IDs.

        To request multiple values, use:
        - &client=1&client=2
    query_statistics_Countries:
      in: query
      name: countries
      schema:
        type: string
      description: |-
        Names of countries for which data should be displayed.

        English short names from [ISO 3166 standard][1] without the definite article ("the") should be used.

         [1]: https://www.iso.org/obp/ui/#search/code/

        To request multiple values, use:
        - &countries=france&countries=denmark
    query_statistics_Flat:
      in: query
      name: flat
      schema:
        type: boolean
      description: |-
        The way the parameters are arranged in the response.

        Possible values:
        - **true** – Flat structure is used.
        - **false** – Embedded structure is used (default.)
    query_statistics_From:
      in: query
      name: from
      schema:
        type: string
      required: true
      description: |-
        Beginning of the requested time period (ISO 8601/RFC 3339 format, UTC.)

        Example:
        - &from=2018-12-01T00:00:00.000
    query_statistics_Granularity:
      in: query
      name: granularity
      schema:
        type: string
      required: true
      description: |-
        Duration of time chunks into which the data will be divided.

        Possible values:
        - **1m** - available only for up to 1 month in the past.
        - **5m**
        - **15m**
        - **1h**
        - **1d**
    query_statistics_GroupByPaidFeatures:
      in: query
      name: group_by
      schema:
        type: string
      description: |-
        Output data grouping.

        Possible values:
        - **client** - Data is grouped by clients.
        - **resource** - Data is grouped by CDN resources.

        To request multiple values, use:
        - &`group_by`=client&`group_by`=resource
    query_statistics_GroupByTraffic:
      in: query
      name: group_by
      schema:
        type: string
      description: |-
        Output data grouping.

        Possible values:
        - **client** - Data is grouped by clients.
        - **resource** - Data is grouped by CDN resources.
        - **region** - Data is grouped by regions of CDN edge servers.
        - **country** - Data is grouped by countries of CDN edge servers.
        - **vhost** - Data is grouped by resources CNAMEs.
        - **`client_country`** - Data is grouped by countries, based on end-users' location.

        To request multiple values, use:
        - &`group_by`=client&`group_by`=resource
    query_statistics_MetricsAggregated:
      in: query
      name: metrics
      schema:
        type: string
      required: true
      description: |-
        Types of statistics data.

        Possible values:
        - **`upstream_bytes`** - Traffic in bytes from an origin server to CDN servers or to origin shielding when used.
        - **`sent_bytes`** - Traffic in bytes from CDN servers to clients.
        - **`shield_bytes`** - Traffic in bytes from origin shielding to CDN servers.
        - **`total_bytes`** - `shield_bytes`, `upstream_bytes` and `sent_bytes` combined.
        - **`cdn_bytes`** - `sent_bytes` and `shield_bytes` combined.
        - **requests** - Number of requests to edge servers.
        - **`responses_2xx`** - Number of 2xx response codes.
        - **`responses_3xx`** - Number of 3xx response codes.
        - **`responses_4xx`** - Number of 4xx response codes.
        - **`responses_5xx`** - Number of 5xx response codes.
        - **`responses_hit`** - Number of responses with the header Cache: HIT.
        - **`responses_miss`** - Number of responses with the header Cache: MISS.
        - **`cache_hit_traffic_ratio`** - Formula: 1 - `upstream_bytes` / `sent_bytes`. We deduct the non-cached traffic from the total traffic amount.
        - **`shield_usage`** - Origin shielding usage. To get accurate results, you must use grouping or filtering by a client or by a CDN resource.
        - **`raw_logs_usage`** - Logs uploader usage. To get accurate results, you should use grouping or filtering by a client or by a CDN resource.
    query_statistics_MetricsSeries:
      in: query
      name: metrics
      schema:
        type: string
      required: true
      description: |-
        Types of statistics data.

        Possible values:
        - **`upstream_bytes`** - Traffic in bytes from an origin server to CDN servers or to origin shielding when used.
        - **`sent_bytes`** - Traffic in bytes from CDN servers to clients.
        - **`shield_bytes`** - Traffic in bytes from Origin shielding to CDN servers.
        - **`total_bytes`** - `shield_bytes`, `upstream_bytes` and `sent_bytes` combined.
        - **`cdn_bytes`** - `sent_bytes` and `shield_bytes` combined.
        - **requests** - Number of requests to edge servers.
        - **`responses_2xx`** - Number of 2xx response codes.
        - **`responses_3xx`** - Number of 3xx response codes.
        - **`responses_4xx`** - Number of 4xx response codes.
        - **`responses_5xx`** - Number of 5xx response codes.
        - **`responses_hit`** - Number of responses with the header Cache: HIT.
        - **`responses_miss`** - Number of responses with the header Cache: MISS.
        - **`cache_hit_traffic_ratio`** - Formula: 1 - `upstream_bytes` / `sent_bytes`. We deduct the non-cached traffic from the total traffic amount.
    query_statistics_Regions:
      in: query
      name: regions
      schema:
        type: string
      description: |-
        Regions for which data is displayed.

        Possible values:
        - **na** - North America
        - **eu** - Europe
        - **cis** - Commonwealth of Independent States
        - **asia** - Asia
        - **au** - Australia
        - **latam** - Latin America
        - **me** - Middle East
        - **africa** - Africa
        - **sa** - South America
    query_statistics_Resource:
      in: query
      name: resource
      schema:
        type: integer
      description: |-
        CDN resources IDs.

        To request multiple values, use:
        - &resource=1&resource=2
    query_statistics_Service:
      in: query
      name: service
      schema:
        type: string
      required: true
      description: |-
        Service name.

        Possible value:
        - CDN
    query_statistics_To:
      in: query
      name: to
      schema:
        type: string
      required: true
      description: |-
        End of the requested time period (ISO 8601/RFC 3339 format, UTC.)

        Example:
        - &to=2018-12-01T01:00:00.000
    remote_ip_address:
      name: remote_ip_address
      in: query
      schema:
        type: string
      description: Exact IP address from which requests are sent.
    status_code:
      name: status_code
      in: query
      schema:
        type: integer
      description: |-
        Status code returned in the response.

        Specify the first numbers of a status code to get requests for a group of status codes.

        To filter the activity logs by 4xx codes, use:
        - &`status_code`=4 -
    token_id:
      name: token_id
      in: query
      schema:
        type: integer
      description: Permanent API token ID. Requests made with this token should be displayed.
    user_id:
      name: user_id
      in: query
      schema:
        type: integer
      description: User ID.
