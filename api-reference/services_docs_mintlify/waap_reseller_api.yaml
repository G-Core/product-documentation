              example:
                type: request-validation-failed
                title: Request validation error.
                status: 422
                detail: One or more fields have validation errors.
                errors:
                - loc:
                  - body
                  - name
                  detail: Input should be a valid string
                - loc:
                  - body
                  - date
                  detail: Field required
                - loc:
