components:
  schemas:
    APICompositeError:
      properties:
        type:
          type: string
          title: Type
          description: A URI identifier that categorizes the type of error.
        title:
          type: string
          title: Title
          description: A brief, human-readable title for the error.
        status:
          type: integer
          title: Status
          description: The HTTP status code applicable to this error.
        detail:
          anyOf:
          - type: string
          - type: 'null'
          title: Detail
          description: A detailed human-readable explanation of the error.
        errors:
          items:
            $ref: '#/components/schemas/APIFieldError'
          type: array
          title: Errors
          description: A list of detailed errors for individual fields.
      type: object
      required:
      - type
      - title
      - status
      - detail
      - errors
      title: APICompositeError
    APIError:
      properties:
        type:
          type: string
          title: Type
          description: A URI identifier that categorizes the type of error.
        title:
          type: string
          title: Title
          description: A brief, human-readable title for the error.
        status:
          type: integer
          title: Status
          description: The HTTP status code applicable to this error.
        detail:
          anyOf:
          - type: string
          - type: 'null'
          title: Detail
          description: A detailed human-readable explanation of the error.
      type: object
      required:
      - type
      - title
      - status
      - detail
      title: APIError
    APIFieldError:
      properties:
        loc:
          anyOf:
          - items:
              anyOf:
              - type: integer
              - type: string
            type: array
          - {}
          title: Loc
          description: The location of the field or a character number causing the error.
        detail:
          type: string
          title: Detail
          description: A human-readable message describing the error.
      type: object
      required:
      - loc
      - detail
      title: APIFieldError
    BillingReportItem:
      properties:
        date:
          type: string
          title: Date
          description: The date of the accrued billable consumption item
        amount:
          type: integer
          title: Amount
          description: The amount of the billable resource accrued on the date
      type: object
      required:
      - date
      - amount
      title: BillingReportItem
    BreakdownBillingReport:
      properties:
        clients:
          additionalProperties:
            items:
              $ref: '#/components/schemas/BillingReportItem'
            type: array
          type: object
          title: Clients
      type: object
      required:
      - clients
      title: BreakdownBillingReport
    PaginatedResponse_BillingReportItem_:
      properties:
        limit:
          type: integer
          title: Limit
          description: Number of items requested in the response
        offset:
          type: integer
          title: Offset
          description: Items response offset used
        count:
          type: integer
          title: Count
          description: Number of items contain in the response
        results:
          items:
            $ref: '#/components/schemas/BillingReportItem'
          type: array
          title: Results
          description: List of items returned in the response following given criteria
      type: object
      required:
      - limit
      - offset
      - count
      - results
      title: PaginatedResponse[BillingReportItem]
    PongMessage:
      properties:
        message:
          type: string
          title: Message
      type: object
      required:
      - message
      title: PongMessage
      example: &id001
        message: pong
      examples:
      - *id001
    StructuredPaginatedResponse_BreakdownBillingReport_:
      properties:
        limit:
          type: integer
          title: Limit
          description: Number of items requested in the response
        offset:
          type: integer
          title: Offset
          description: Items response offset used
        count:
          type: integer
          title: Count
          description: Number of items contain in the response
        results:
          $ref: '#/components/schemas/BreakdownBillingReport'
          description: Items on the current page from the result set
      type: object
      required:
      - limit
      - offset
      - count
      - results
      title: StructuredPaginatedResponse[BreakdownBillingReport]
  securitySchemes:
    APIKey:
      description: |-
        API key for authentication. Make sure to include the word `apikey`, followed by a single space and then your token.
        Example: `apikey 1234$abcdef`
      type: apiKey
      in: header
      name: Authorization
