openapi: 3.1.0
info:
  title: Gcore OpenAPI – WAAP Reseller API
  description: This OpenAPI is an aggregated OpenAPI specification that unifies all Gcore products into a single file. It covers Cloud, CDN, DNS, WAAP, DDoS Protection, Object Storage, Streaming, and FastEdge services.
  version: 8826b5b4fc9c
servers:
- url: https://api.gcore.com
paths:
  /waap/v1/prebilling/total/{metric}:
    get:
      tags:
      - Pre-billing
      summary: Get aggregated billable consumption by metric
      description: Retrieve an aggregated report on billable consumption by given metric
      operationId: get_consumption_total_v1_prebilling_total__metric__get
      parameters:
      - name: metric
        in: path
        required: true
        schema:
          enum:
          - domains
          - volume
          - requests
          type: string
          description: The metric to get billable consumption for
          title: Metric
        description: The metric to get billable consumption for
      - name: client_ids
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: integer
          - type: 'null'
          description: List of client IDs to filter the billable consumption by, if specified
          examples:
          - - 1
            - 2
            - 3
          title: Client Ids
        description: List of client IDs to filter the billable consumption by, if specified
      - name: from
        in: query
        required: true
        schema:
          type: string
          format: date
          description: The report start date (inclusive) in ISO 8601 format
          title: From
        description: The report start date (inclusive) in ISO 8601 format
      - name: to
        in: query
        required: true
        schema:
          type: string
          format: date
          description: The report end date (exclusive) in ISO 8601 format
          title: To
        description: The report end date (exclusive) in ISO 8601 format
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 0
          description: Number of items to return
          default: 100
          title: Limit
        description: Number of items to return
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          maximum: 100000
          minimum: 0
          description: Number of items to skip
          default: 0
          title: Offset
        description: Number of items to skip
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse_BillingReportItem_'
        '400':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/APIError'
              example:
                type: http-bad-request
                title: Bad Request
                status: 400
                detail: 'Invalid domain name: '''''''''
          description: Bad Request
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              example:
                detail: Auth token is missing or invalid
        '403':
          description: Unauthenticated
          content:
            application/problem+json:
              example:
                detail: Permission denied
        '404':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/APIError'
              example:
                type: http-not-found
                title: Not Found
                status: 404
                detail: The resource is not found
          description: Not Found
        '422':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/APICompositeError'
              example:
                type: request-validation-failed
                title: Request validation error.
                status: 422
                detail: One or more fields have validation errors.
                errors:
                - loc:
                  - body
                  - name
                  detail: Input should be a valid string
                - loc:
                  - body
                  - date
                  detail: Field required
                - loc:
                  - query
                  - limit
                  detail: Field required
          description: Unprocessable Entity
        '500':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/APIError'
              example:
                type: internal-server-error
                title: Internal server error.
                status: 500
                detail: An unexpected condition was encountered which prevented the server from fulfilling the request.
          description: Internal Server Error
