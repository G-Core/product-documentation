"openapi": "3.1.0"
"info": {"title": "Gcore OpenAPI – Object Storage API", "description": "This OpenAPI is an aggregated OpenAPI specification that unifies all Gcore products into a single file. It covers Cloud, CDN, DNS, WAAP, DDoS Protection, Object Storage, Streaming, and FastEdge services.", "version": "2026-04-28T08:58:36.675713+00:00"}
"servers": ["url": "https://api.gcore.com"]
paths:
  "/storage/notifications/v1/event":
    "put": {"tags": ["Notifications"], "summary": "Update event", "description": "Modify an existing notification event threshold. Update the limits for storage usage, file quantity, traffic, or request alerts.", "operationId": "eventUpdateHttp", "parameters": [{"name": "client_id", "in": "query", "description": "Client ID", "schema": {"type": "integer", "format": "int64"}}], "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/EventResponse"}}}, "required": true}, "responses": {"204": {"description": "A SuccessResponse is a response that shows that operations was completed successfully", "content": {}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "401": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "409": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "x-codegen-request-body-name": "Body"}
    "post": {"tags": ["Notifications"], "summary": "Create event", "description": "Create a single notification event threshold. Configure alerts for when storage usage, file count, traffic, or requests exceed specified limits for a storage or bucket.", "operationId": "eventCreateHttp", "parameters": [{"name": "client_id", "in": "query", "description": "Client ID", "schema": {"type": "integer", "format": "int64"}}], "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/EventResponse"}}}, "required": true}, "responses": {"200": {"description": "EventResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/EventResponse"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "401": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "409": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "x-codegen-request-body-name": "Body"}
    "delete": {"tags": ["Notifications"], "summary": "Delete event", "description": "Remove a notification event threshold. This will stop alerts for the specified storage usage, file count, traffic, or request limit.", "operationId": "eventDeleteHttp", "parameters": [{"name": "client_id", "in": "query", "description": "Client ID", "schema": {"type": "integer", "format": "int64"}}], "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/EventResponse"}}}, "required": true}, "responses": {"204": {"description": "A SuccessResponse is a response that shows that operations was completed successfully", "content": {}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "401": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "409": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "x-codegen-request-body-name": "Body"}
  "/storage/notifications/v1/events":
    "get": {"tags": ["Notifications"], "summary": "List events", "description": "Returns configured notification events for the client. Shows all active thresholds for storage usage, file count, traffic, and request limits.", "operationId": "eventsGetHttp", "responses": {"200": {"description": "EventsResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/EventsResponse"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "401": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "409": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}}
    "post": {"tags": ["Notifications"], "summary": "Update events", "description": "Configure multiple notification events at once. Only specified events will be updated - other events remain unchanged. Use this to set thresholds for storage usage alerts, file quantity limits, traffic warnings, and request quotas.", "operationId": "eventsCreateHttp", "responses": {"200": {"description": "EventsResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/EventsResponse"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "401": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "409": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}}
  "/storage/notifications/v1/events/configurator":
    "get": {"tags": ["Notifications"], "summary": "Get event types", "description": "Returns available notification event types and their field structures. Use this to understand what event types you can configure (`reaching_used_space`, `reaching_files_quantity`, `reaching_used_traffic`, `reaching_used_requests`) and their required fields.", "operationId": "eventsMetaHttp", "responses": {"200": {"description": "EventsMetaResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/EventsMetaResponse"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "401": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "409": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}}
  "/storage/provisioning/v1/key":
    "get": {"tags": ["SSHKeys"], "summary": "List SSH keys", "description": "Returns all SSH public keys for SFTP storage access. These keys enable passwordless authentication to SFTP storages.", "operationId": "keyListHttpV1", "parameters": [{"name": "offset", "in": "query", "description": "Number of records to skip before beginning to write in response.", "schema": {"minimum": 0, "type": "integer", "format": "uint64"}}, {"name": "limit", "in": "query", "description": "Max number of records in response", "schema": {"maximum": 1000, "minimum": 1, "type": "integer", "format": "uint64", "default": 10}}, {"name": "order_by", "in": "query", "description": "Field name to sort by", "schema": {"type": "string"}}, {"name": "order_direction", "in": "query", "description": "Ascending or descending order", "schema": {"type": "string", "enum": ["asc", "desc"]}}, {"name": "id", "in": "query", "schema": {"type": "string"}}, {"name": "name", "in": "query", "schema": {"type": "string"}}, {"name": "created", "in": "query", "schema": {"type": "string"}}], "responses": {"200": {"description": "KeyListEndpointRes", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/KeyListEndpointRes"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
    "put": {"tags": ["SSHKeys"], "summary": "Create SSH key", "description": "Creates an SSH public key for SFTP storage access. These keys are used for passwordless authentication to SFTP storages and are not used for S3-compatible storage.\nDeprecated, use POST /provisioning/v1/key instead.", "operationId": "keyCreateHttp", "requestBody": {"content": {"application/json": {"schema": {"type": "object", "properties": {"key": {"type": "string"}, "name": {"type": "string"}}}}}, "required": false}, "responses": {"200": {"description": "Key", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/Key"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "409": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true, "x-codegen-request-body-name": "Body"}
    "post": {"tags": ["SSHKeys"], "summary": "Create SSH key", "description": "Creates an SSH public key for SFTP storage access. These keys are used for passwordless authentication to SFTP storages and are not used for S3-compatible storage.\nDeprecated: Use POST /v4/`ssh_keys` instead.", "operationId": "keyCreateHttpPost", "requestBody": {"content": {"application/json": {"schema": {"type": "object", "properties": {"key": {"type": "string"}, "name": {"type": "string"}}}}}, "required": false}, "responses": {"200": {"description": "Key", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/Key"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "409": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true, "x-codegen-request-body-name": "Body"}
  "/storage/provisioning/v1/key/{key_id}":
    "delete": {"tags": ["SSHKeys"], "summary": "Delete SSH key", "description": "Removes an SSH public key. This will revoke SFTP access for any storages using this key.\nDeprecated: Use DELETE /v4/`ssh_keys`/{`ssh_key_id`} instead.", "operationId": "keyDeleteHttp", "parameters": [{"name": "key_id", "in": "path", "required": true, "schema": {"type": "integer", "format": "int64"}}], "responses": {"204": {"description": "A SuccessResponse is a response that shows that operations was completed successfully", "content": {}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
  "/storage/provisioning/v1/location":
    "get": {"tags": ["Storage Locations"], "summary": "List locations", "description": "Returns available storage locations where you can create storages. Each location represents a geographic region with specific data center facilities.", "operationId": "locationListHttp", "responses": {"200": {"description": "clientLocationRes", "content": {"application/json": {"schema": {"type": "array", "items": {"$ref": "#/components/schemas/clientLocationRes"}}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
  "/storage/provisioning/v1/storage":
    "get": {"tags": ["Storage"], "summary": "List storages", "description": "Returns a paginated list of all storages with optional filtering by name, location, type, and status.\n\nDeprecated: Use GET /v4/`object_storages` for S3 storages or GET /v4/`sftp_storages` for SFTP storages instead.", "operationId": "storageListHttpV1", "parameters": [{"name": "offset", "in": "query", "description": "Number of records to skip before beginning to write in response.", "schema": {"minimum": 0, "type": "integer", "format": "uint64"}}, {"name": "limit", "in": "query", "description": "Max number of records in response", "schema": {"maximum": 1000, "minimum": 1, "type": "integer", "format": "uint64", "default": 10}}, {"name": "order_by", "in": "query", "description": "Field name to sort by", "schema": {"type": "string"}}, {"name": "order_direction", "in": "query", "description": "Ascending or descending order", "schema": {"type": "string", "enum": ["asc", "desc"]}}, {"name": "id", "in": "query", "description": "Filter by storage ID", "schema": {"type": "string"}}, {"name": "name", "in": "query", "description": "Filter by storage name (exact match)", "schema": {"type": "string"}}, {"name": "location", "in": "query", "description": "Filter by storage location/region", "schema": {"type": "string"}}, {"name": "type", "in": "query", "description": "Filter by storage type", "schema": {"type": "string", "enum": ["s3_compatible", "sftp"]}}, {"name": "status", "in": "query", "description": "Filter by storage status", "schema": {"type": "string", "enum": ["active", "creating", "ok", "updating", "deleting", "deleted"]}}, {"name": "show_deleted", "in": "query", "description": "Include deleted storages in the response", "schema": {"type": "boolean"}}], "responses": {"200": {"description": "StorageListEndpointRes", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/StorageListEndpointRes"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
    "put": {"tags": ["Storage"], "summary": "Create storage", "description": "Creates a new storage instance (S3 or SFTP) in the specified location and returns the storage details including credentials.\n\nDeprecated: Use POST /v4/`object_storages` for S3 storage or\nPOST /v4/`sftp_storages` for SFTP storage instead.", "operationId": "storageCreateHttp", "requestBody": {"content": {"application/json": {"schema": {"required": ["location", "name", "type"], "type": "object", "properties": {"generate_sftp_password": {"type": "boolean", "description": "Automatically generate a secure password for SFTP storage access. Only applicable when type is `sftp`. When `true`, a random password will be generated and returned in the response.", "example": true}, "location": {"type": "string", "description": "Geographic location where the storage will be provisioned. Each location represents a specific data center region.", "example": "s-region-1"}, "name": {"maxLength": 256, "pattern": "^[a-zA-Z0-9_-]+$", "type": "string", "description": "Unique storage name identifier. Must contain only letters, numbers, dashes, and underscores. Cannot be empty and must be less than 256 characters.", "example": "my-storage-prod"}, "sftp_password": {"type": "string", "description": "Custom password for SFTP storage access. Only applicable when type is `sftp`. If not provided and `generate_sftp_password` is `false`, no password authentication will be available."}, "type": {"type": "string", "description": "Storage protocol type. Choose 's3_compatible' for S3-compatible object storage\nwith API access, or `sftp` for SFTP file transfer protocol.", "example": "s3_compatible", "enum": ["sftp", "s3_compatible"]}}}}}, "required": false}, "responses": {"200": {"description": "Storage", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/storage_Storage"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "403": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}, "409": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true, "x-codegen-request-body-name": "Body"}
  "/storage/provisioning/v1/storage/{storage_id}":
    "get": {"tags": ["Storage"], "summary": "Get storage", "description": "Retrieves detailed information about a specific storage including its configuration, credentials, and current status.\n\nDeprecated: Use GET /v4/`object_storages`/{`storage_id`} for S3 storages or GET /v4/`sftp_storages`/{`storage_id`} for SFTP storages instead.", "operationId": "storageGetHttp", "parameters": [{"name": "storage_id", "in": "path", "required": true, "schema": {"type": "integer", "format": "int64"}}], "responses": {"200": {"description": "Storage", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/storage_Storage"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
    "post": {"tags": ["Storage"], "summary": "Update storage", "description": "Updates storage configuration such as expiration date and server alias.\n\nDeprecated: Use PATCH /v4/`sftp_storages`/{`storage_id`} for SFTP storage updates instead.", "operationId": "storageUpdateHttp", "parameters": [{"name": "storage_id", "in": "path", "description": "The unique identifier of the storage to update", "required": true, "schema": {"type": "integer", "format": "int64"}}], "requestBody": {"content": {"application/json": {"schema": {"type": "object", "properties": {"expires": {"type": "string", "description": "Duration when the storage should expire in format like \"2 years 6 months 2 weeks 3 days 5 hours 10 minutes 15 seconds\". Leave empty to remove expiration.", "example": "2 years 6 months 2 weeks 3 days 5 hours 10 minutes 15 seconds"}, "server_alias": {"type": "string", "description": "Custom domain alias for accessing the storage. Leave empty to remove alias.", "example": "my-storage.company.com"}}}}}, "required": false}, "responses": {"200": {"description": "Storage", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/storage_Storage"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true, "x-codegen-request-body-name": "Body"}
    "delete": {"tags": ["Storage"], "summary": "Delete storage", "description": "Permanently deletes a storage and all its data. This action cannot be undone.\n\nDeprecated: Use DELETE /v4/`object_storages`/{`storage_id`}\nor DELETE /v4/`sftp_storages`/{`storage_id`} instead.", "operationId": "storageDeleteHttp", "parameters": [{"name": "storage_id", "in": "path", "required": true, "schema": {"type": "integer", "format": "int64"}}], "responses": {"204": {"description": "A SuccessResponse is a response that shows that operations was completed successfully", "content": {}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
  "/storage/provisioning/v1/storage/{storage_id}/credentials":
    "post": {"tags": ["Storage"], "summary": "Reset storage credentials", "description": "WARNING: This is a destructive operation — it removes ALL existing access keys and generates\na single new key pair. Any applications using the old keys will lose access immediately.\n\nFor S3 storage this replaces all existing access keys with a single new key pair.\nFor SFTP storage this resets the password.\n\nDeprecated: Use POST /v4/`object_storages`/{`storage_id`}/`access_keys` to create individual access keys,\nDELETE /v4/`object_storages`/{`storage_id`}/`access_keys`/{`access_key`} to remove specific keys,\nor PATCH /v4/`sftp_storages`/{`storage_id`}/credentials for SFTP storage instead.", "operationId": "storageUpdateCredentialsHttp", "parameters": [{"name": "storage_id", "in": "path", "required": true, "schema": {"type": "integer", "format": "int64"}}], "requestBody": {"content": {"application/json": {"schema": {"type": "object", "properties": {"delete_sftp_password": {"type": "boolean"}, "generate_s3_keys": {"type": "boolean"}, "generate_sftp_password": {"type": "boolean"}, "reset_sftp_keys": {"type": "boolean"}, "sftp_password": {"type": "string"}}}}}, "required": false}, "responses": {"200": {"description": "Storage", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/storage_Storage"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true, "x-codegen-request-body-name": "Body"}
  "/storage/provisioning/v1/storage/{storage_id}/key/{key_id}/link":
    "post": {"tags": ["Storage"], "summary": "Link SSH key to SFTP storage", "description": "Associates an SSH public key with an SFTP storage, enabling passwordless authentication. Only works with SFTP storage types - not applicable to S3-compatible storage.\n\nDeprecated: Use PATCH /v4/`sftp_storages`/{`storage_id`} with `ssh_key_ids` array instead.", "operationId": "keyLinkHttp", "parameters": [{"name": "storage_id", "in": "path", "required": true, "schema": {"type": "integer", "format": "int64"}}, {"name": "key_id", "in": "path", "required": true, "schema": {"type": "integer", "format": "int64"}}], "responses": {"204": {"description": "A SuccessResponse is a response that shows that operations was completed successfully", "content": {}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
  "/storage/provisioning/v1/storage/{storage_id}/key/{key_id}/unlink":
    "post": {"tags": ["Storage"], "summary": "Unlink SSH key from SFTP storage", "description": "Removes SSH key association from an SFTP storage, disabling passwordless authentication for that key. The key itself remains available for other storages.\n\nDeprecated: Use PATCH /v4/`sftp_storages`/{`storage_id`} with `ssh_key_ids` array instead.", "operationId": "keyUnlinkHttp", "parameters": [{"name": "storage_id", "in": "path", "required": true, "schema": {"type": "integer", "format": "int64"}}, {"name": "key_id", "in": "path", "required": true, "schema": {"type": "integer", "format": "int64"}}], "responses": {"204": {"description": "A SuccessResponse is a response that shows that operations was completed successfully", "content": {}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
  "/storage/provisioning/v1/storage/{storage_id}/restore":
    "post": {"tags": ["Storage"], "summary": "Restore deleted storage", "description": "Restores a previously deleted S3 storage if it was deleted within the last 2 weeks. SFTP storages cannot be restored.\n\nDeprecated: Use POST /v4/`object_storages`/{`storage_id`}/restore instead.", "operationId": "storageRestoreHttp", "parameters": [{"name": "storage_id", "in": "path", "required": true, "schema": {"type": "integer", "format": "int64"}}, {"name": "client_id", "in": "query", "schema": {"type": "integer", "format": "int64"}}], "responses": {"204": {"description": "A SuccessResponse is a response that shows that operations was completed successfully", "content": {}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
  "/storage/provisioning/v1/storage/{storage_id}/s3/bucket/{bucket_name}":
    "post": {"tags": ["Storage"], "summary": "Create S3 bucket", "description": "Creates a new bucket within an S3 storage. Only applicable to S3-compatible storages.\n\nDeprecated: Use POST /v4/`object_storages`/{`storage_id`}/buckets with {\"name\": \"bucket-name\"} instead.", "operationId": "storageBucketCreateHttp", "parameters": [{"name": "storage_id", "in": "path", "required": true, "schema": {"type": "integer", "format": "int64"}}, {"name": "bucket_name", "in": "path", "required": true, "schema": {"type": "string"}}], "responses": {"204": {"description": "A SuccessResponse is a response that shows that operations was completed successfully", "content": {}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
    "delete": {"tags": ["Storage"], "summary": "Delete S3 bucket", "description": "Removes a bucket from an S3 storage. All objects in the bucket will be automatically deleted before the bucket is removed.\n\nDeprecated: Use DELETE /v4/`object_storages`/{`storage_id`}/buckets/{`bucket_name`} instead.", "operationId": "storageBucketRemoveHttp", "parameters": [{"name": "storage_id", "in": "path", "required": true, "schema": {"type": "integer", "format": "int64"}}, {"name": "bucket_name", "in": "path", "required": true, "schema": {"type": "string"}}], "responses": {"204": {"description": "A SuccessResponse is a response that shows that operations was completed successfully", "content": {}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
  "/storage/provisioning/v1/storage/{storage_id}/s3/bucket/{bucket_name}/cors":
    "get": {"tags": ["Storage"], "summary": "Get S3 bucket CORS", "description": "Retrieves the current Cross-Origin Resource Sharing (CORS) configuration for an S3 bucket, showing which domains are allowed to access the bucket from web browsers.\n\nDeprecated: Use GET /v4/`object_storages`/{`storage_id`}/buckets/{`bucket_name`} instead,\nwhich returns CORS along with policy and lifecycle configuration.", "operationId": "getStorageBucketCORSHttp", "parameters": [{"name": "storage_id", "in": "path", "description": "Unique identifier for the storage instance", "required": true, "schema": {"type": "integer", "format": "int64"}}, {"name": "bucket_name", "in": "path", "description": "Name of the S3 bucket to retrieve CORS configuration from", "required": true, "schema": {"type": "string"}}], "responses": {"200": {"description": "StorageGetBucketCorsEndpointRes", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/StorageGetBucketCorsEndpointRes"}}}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true}
    "post": {"tags": ["Storage"], "summary": "Create S3 bucket CORS", "description": "Configures Cross-Origin Resource Sharing (CORS) rules for an S3 bucket, allowing web applications from specified domains to access bucket resources directly from browsers.\n\nDeprecated: Use PATCH /v4/`object_storages`/{`storage_id`}/buckets/{`bucket_name`} with {\"cors\": {\"allowed_origins\": [...]}} instead.", "operationId": "storageBucketCORSCreateHttp", "parameters": [{"name": "storage_id", "in": "path", "description": "Unique identifier for the storage instance", "required": true, "schema": {"type": "integer", "format": "int64"}}, {"name": "bucket_name", "in": "path", "description": "Name of the S3 bucket to configure CORS for", "required": true, "schema": {"type": "string"}}], "requestBody": {"description": "CORS configuration for the bucket", "content": {"application/json": {"schema": {"type": "object", "properties": {"allowedOrigins": {"type": "array", "description": "List of allowed origins for CORS requests", "example": ["https://example.com", "https://app.example.com", "*"], "items": {"type": "string"}}}}}}, "required": true}, "responses": {"204": {"description": "A SuccessResponse is a response that shows that operations was completed successfully", "content": {}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true, "x-codegen-request-body-name": "Body"}
  "/storage/provisioning/v1/storage/{storage_id}/s3/bucket/{bucket_name}/lifecycle":
    "post": {"tags": ["Storage"], "summary": "Configure S3 bucket automatic cleanup", "description": "Sets up automatic object expiration for an S3 bucket. All objects in the bucket will be automatically deleted after the specified number of days to help manage storage costs and meet compliance requirements. This applies a global lifecycle rule to the entire bucket - all existing and future objects will be subject to the expiration policy.\n\nDeprecated: Use PATCH /v4/`object_storages`/{`storage_id`}/buckets/{`bucket_name`} with {\"lifecycle\": {\"expiration_days\": N}} instead.", "operationId": "storageBucketLifecycleCreateHttp", "parameters": [{"name": "storage_id", "in": "path", "description": "Unique identifier for the storage instance", "required": true, "schema": {"type": "integer", "format": "int64"}}, {"name": "bucket_name", "in": "path", "description": "Name of the S3 bucket to configure lifecycle policy for", "required": true, "schema": {"type": "string"}}], "requestBody": {"description": "Lifecycle configuration for automatic object cleanup", "content": {"application/json": {"schema": {"type": "object", "properties": {"expiration_days": {"type": "integer", "description": "Number of days after which objects will be automatically deleted from the bucket.\nMust be a positive integer. Common values: 30 for monthly cleanup, 365 for yearly retention.", "format": "int64", "example": 30}}}}}, "required": true}, "responses": {"204": {"description": "A SuccessResponse is a response that shows that operations was completed successfully", "content": {}}, "400": {"description": "ErrResponse", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrResponse"}}}}}, "deprecated": true, "x-codegen-request-body-name": "Body"}
