    kv_store: {"type": "object", "required": ["name"], "properties": {"name": {"type": "string", "description": "A name of the store"}, "comment": {"type": "string", "description": "A description of the store"}, "app_count": {"type": "integer", "description": "The number of applications that use this store", "readOnly": true, "x-go-type-skip-optional-pointer": true, "x-omitempty": false}, "byod": {"type": "object", "$ref": "#/components/schemas/byod"}, "size": {"type": "integer", "format": "int64", "description": "Total store size in bytes (zero for BYOD stores)", "readOnly": true, "x-go-type-skip-optional-pointer": true, "x-omitempty": false}, "revision": {"type": "integer", "format": "int64", "description": "Current store revision (only for non-BYOD stores)", "readOnly": true}, "updated_at": {"type": "string", "format": "date-time", "description": "Timestamp of last store revision (only for non-BYOD stores)", "readOnly": true}}}
    kv_store_short: {"type": "object", "required": ["id", "name", "app_count"], "properties": {"id": {"type": "integer", "format": "int64", "description": "The unique identifier of the store", "readOnly": true, "x-go-type-skip-optional-pointer": true}, "name": {"type": "string", "description": "A name of the store"}, "comment": {"type": "string", "description": "A description of the store"}, "app_count": {"type": "integer", "description": "The number of applications that use this store", "x-omitempty": false}, "size": {"type": "integer", "format": "int64", "description": "Total store size in bytes"}}}
    log: {"type": "object", "properties": {"id": {"type": "string", "description": "Unique identifier for this log entry"}, "app_name": {"type": "string", "description": "Name of the application that generated this log"}, "timestamp": {"type": "string", "format": "date-time", "description": "When the log was generated (RFC3339 format)"}, "log": {"type": "string", "description": "The actual log message content"}, "edge": {"type": "string", "description": "Edge location where the log originated"}, "client_ip": {"type": "string", "description": "IP address of the client that triggered the log"}, "request_id": {"type": "string", "description": "Request ID"}}}
    modify_store_data_entry: {"type": "object", "allOf": ["$ref": "#/components/schemas/store_entry", {"type": "object", "required": ["op"], "properties": {"op": {"$ref": "#/components/schemas/store_entry_op"}}}]}
    network: {"type": "object", "required": ["name", "is_default"], "properties": {"name": {"type": "string", "description": "Network name", "minLength": 1, "maxLength": 64, "pattern": "^[a-z0-9][a-z0-9_-]*[a-z0-9]$"}, "is_default": {"type": "boolean", "description": "Is network is default"}}}
    secret: {"type": "object", "properties": {"name": {"type": "string", "description": "The unique name of the secret.", "minLength": 1, "maxLength": 128, "pattern": "^[a-zA-Z0-9][a-zA-Z0-9_-]*[a-zA-Z0-9]$"}, "comment": {"type": "string", "description": "A description or comment about the secret.", "maxLength": 1024}, "app_count": {"type": "integer", "format": "int", "description": "The number of applications that use this secret.", "readOnly": true}, "secret_slots": {"type": "array", "description": "A list of secret slots associated with this secret.", "items": {"$ref": "#/components/schemas/secret_slot"}, "x-stainless-collection-type": "set"}}}
    secret_short: {"type": "object", "properties": {"id": {"type": "integer", "format": "int64", "description": "The unique identifier of the secret."}, "name": {"type": "string", "description": "The unique name of the secret."}, "comment": {"type": "string", "description": "A description or comment about the secret."}, "app_count": {"type": "integer", "format": "int", "description": "The number of applications that use this secret.", "readOnly": true}}, "required": ["name"]}
    secret_slot: {"type": "object", "properties": {"slot": {"type": "integer", "format": "int64", "description": "Unix timestamp (seconds since epoch) indicating when this secret version becomes active. Use for time-based secret rotation.", "example": 1704067200}, "value": {"type": "string", "description": "The plaintext secret value. Will be encrypted with AES-256-GCM before storage.", "writeOnly": true, "maxLength": 4096, "example": "P@ssw0rd123!"}, "checksum": {"type": "string", "description": "SHA-256 hash of the decrypted value for integrity verification (auto-generated)", "readOnly": true, "example": "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8"}}, "required": ["slot"]}
