xpires to prevent performance impact.", "default": false, "example": false}, "debug_until": {"type": "string", "format": "date-time", "readOnly": true, "description": "When debugging finishes"}, "comment": {"type": "string", "description": "Optional human-readable description of the application's purpose", "maxLength": 1024, "example": "Production API gateway for customer portal", "x-stainless-terraform-configurability": "computed_optional"}, "api_type": {"readOnly": true, "type": "string", "description": "Wasm API type"}, "networks": {"readOnly": true, "description": "Networks", "type": "array", "items": {"type": "string"}}, "secrets": {"type": "object", "description": "Application secrets", "additionalProperties": {"$ref": "#/components/schemas/app_secret_short"}}, "stores": {"type": "object", "description": "Application edge stores", "additionalProperties": {"$ref": "#/components/schemas/app_store"}}}}
    app_secret_short: {"type": "object", "description": "Application secret short description", "required": ["id"], "properties": {"id": {"type": "integer", "format": "int64", "description": "The unique identifier of the secret."}, "name": {"type": "string", "readOnly": true, "description": "The unique name of the secret."}, "comment": {"type": "string", "readOnly": true, "description": "A description or comment about the secret."}}}
    app_short: {"required": ["id", "name", "status", "binary", "api_type", "plan_id"], "type": "object", "properties": {"id": {"type": "integer", "format": "int64", "description": "App ID", "minimum": 1}, "name": {"type": "string", "description": "App name"}, "url": {"type": "string", "description": "App URL"}, "status": {"type": "integer", "description": "Status code:  \n0 - draft (inactive)  \n1 - enabled  \n2 - disabled  \n3 - hourly call limit exceeded  \n4 - daily call limit exceeded  \n5 - suspended"}, "binary": {"type": "integer", "format": "int64", "description": "Binary ID"}, "comment": {"type": "string", "description": "Description of the binary"}, "api_type": {"type": "string", "description": "Wasm API type"}, "debug_until": {"type": "string", "format": "date-time", "description": "When debugging finishes"}, "debug": {"default": false, "description": "Switch on logging for 30 minutes (switched off by default)", "type": "boolean", "writeOnly": true}, "template": {"type": "integer", "format": "int64", "description": "Template ID"}, "template_name": {"type": "string", "description": "Template name"}, "networks": {"description": "Networks", "type": "array", "items": {"type": "string"}}, "upgradeable_to": {"type": "integer", "format": "int64", "description": "ID of the binary the app can be upgraded to"}, "plan_id": {"type": "integer", "format": "int64", "description": "Application plan ID"}, "plan": {"type": "string", "description": "Application plan name"}}}
    app_store: {"type": "object", "description": "Application stores", "required": ["id", "name"], "properties": {"id": {"type": "integer", "format": "int64", "description": "The identifier of the store"}, "name": {"type": "string", "readOnly": true, "x-go-type-skip-optional-pointer": true, "description": "The name of the store"}, "comment": {"type": "string", "readOnly": true, "description": "A description of the store"}}}
    binary: {"required": ["id", "status", "source", "api_type"], "type": "object", "properties": {"id": {"type": "integer", "format": "int64", "description": "Binary ID"}, "status": {"type": "integer", "description": "Status code:  \n0 - pending  \n1 - compiled  \n2 - compilation failed (errors available)  \n3 - compilation failed (errors not available)  \n4 - resulting binary exceeded the limit  \n5 - unsupported source language", "minimum": 0, "maximum": 5}, "source": {"type": "integer", "description": "Source language:  \n0 - unknown  \n1 - Rust  \n2 - JavaScript  \n3 - Go", "minimum": 0, "maximum": 3}, "unref_since": {"type": "string", "description": "Not used since (UTC)"}, "api_type": {"type": "string", "description": "Wasm API type"}, "checksum": {"type": "string", "description": "MD5 hash of the binary"}}}
    binary_short: {"required": ["id", "status", "api_type"], "type": "object", "properties": {"id": {"type": "integer", "format": "int64", "description": "Binary ID"}, "status": {"type": "integer", "description": "Status code:  \n0 - pending  \n1 - compiled  \n2 - compilation failed (errors available)  \n3 - compilation failed (errors not available)  \n4 - resulting binary exceeded the limit  \n5 - unsupported source language"}, "unref_since": {"type": "string", "description": "Not used since (UTC)"}, "api_type": {"type": "string", "description": "Wasm API type"}, "checksum": {"type": "string", "description": "MD5 hash of the binary"}, "source": {"type": "integer", "description": "Source language:  \n0 - unknown  \n1 - Rust  \n2 - JavaScript  \n3 - Go", "minimum": 0, "maximum": 3}}}
    byod: {"type": "object", "description": "BYOD (Bring Your Own Data) settings", "required": ["url", "prefix"], "properties": {"url": {"type": "string", "description": "Connection URL for external storage service (Redis, PostgreSQL, etc.)", "example": "redis://redis.example.com:6379/0"}, "prefix": {"type": "string", "description": "Key prefix to namespace your data within the external store", "example": "app:prod:"}}}
