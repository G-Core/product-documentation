    "put": {"description": "Modify an existing template's configuration.\nUpdates affect future applications created from this template; existing apps are not changed.", "operationId": "updateTemplate", "parameters": [{"description": "Unique identifier of the template to update", "in": "path", "name": "template_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/template"}}}, "description": "Complete template configuration (replaces existing)", "required": true}, "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/template_short"}}}, "description": "Template updated successfully, returns updated metadata"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Template not found"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service temporarily unavailable"}}, "summary": "Update template", "tags": ["FastEdge Templates"], "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\ntemplate_short = client.fastedge.templates.replace(\n    template_id=0,\n    binary_id=12345,\n    name=\"api-gateway-template\",\n    owned=True,\n    params=[{\n        \"data_type\": \"string\",\n        \"mandatory\": True,\n        \"name\": \"api_key\",\n    }],\n)\nprint(template_short.id)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/fastedge\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\ttemplateShort, err := client.Fastedge.Templates.Replace(\n\t\tcontext.TODO(),\n\t\t0,\n\t\tfastedge.TemplateReplaceParams{\n\t\t\tTemplate: fastedge.TemplateParam{\n\t\t\t\tBinaryID: 12345,\n\t\t\t\tName:     \"api-gateway-template\",\n\t\t\t\tOwned:    true,\n\t\t\t\tParams: []fastedge.TemplateParameter{{\n\t\t\t\t\tDataType:  fastedge.TemplateParameterDataTypeString,\n\t\t\t\t\tMandatory: true,\n\t\t\t\t\tName:      \"api_key\",\n\t\t\t\t}},\n\t\t\t},\n\t\t},\n\t)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", templateShort.ID)\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:templates replace \\\n  --api-key 'My API Key' \\\n  --template-id 0 \\\n  --binary-id 12345 \\\n  --name api-gateway-template \\\n  --owned \\\n  --param '{data_type: string, mandatory: true, name: api_key}'"}]}
