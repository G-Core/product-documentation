"openapi": "3.1.0"
"info": {"title": "Gcore OpenAPI – FastEdge API", "description": "This OpenAPI is an aggregated OpenAPI specification that unifies all Gcore products into a single file. It covers Cloud, CDN, DNS, WAAP, DDoS Protection, Object Storage, Streaming, and FastEdge services.", "version": "2026-04-12T10:19:48.163189+00:00"}
