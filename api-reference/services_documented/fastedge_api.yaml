  "/fastedge/v1/apps":
    "get": {"description": "Retrieve a paginated list of applications owned by the authenticated client.\nResults can be filtered by name, API type, status, template, binary, or plan, and sorted by various fields.", "operationId": "listApps", "parameters": [{"description": "Filter by application name (case-insensitive partial match)", "in": "query", "name": "name", "required": false, "schema": {"maxLength": 255, "minLength": 1, "type": "string"}}, {"description": "API type:  \nwasi-http - WASI with HTTP entry point  \nproxy-wasm - Proxy-Wasm app, callable from CDN", "example": "wasi-http", "in": "query", "name": "api_type", "required": false, "schema": {"enum": ["wasi-http", "proxy-wasm"], "type": "string"}}, {"description": "Status code:  \n0 - draft (inactive)  \n1 - enabled  \n2 - disabled  \n3 - hourly call limit exceeded  \n4 - daily call limit exceeded  \n5 - suspended", "example": 1, "in": "query", "name": "status", "required": false, "schema": {"maximum": 5, "minimum": 0, "type": "integer"}}, {"description": "Filter by template ID (shows apps created from this template)", "in": "query", "name": "template", "required": false, "schema": {"format": "int64", "minimum": 1, "type": "integer"}}, {"description": "Filter by binary ID (shows apps using this binary)", "in": "query", "name": "binary", "required": false, "schema": {"format": "int64", "minimum": 1, "type": "integer"}}, {"description": "Filter by plan ID", "in": "query", "name": "plan", "required": false, "schema": {"format": "int64", "minimum": 1, "type": "integer"}}, {"description": "Maximum number of results to return", "example": 50, "in": "query", "name": "limit", "required": false, "schema": {"maximum": 1000, "minimum": 1, "type": "integer"}}, {"description": "Number of results to skip for pagination", "example": 0, "in": "query", "name": "offset", "required": false, "schema": {"default": 0, "minimum": 0, "type": "integer"}}, {"description": "Sort order. Use - prefix for descending (e.g., -name sorts by name descending)", "example": "id", "in": "query", "name": "ordering", "schema": {"enum": ["name", "-name", "status", "-status", "id", "-id", "template", "-template", "binary", "-binary", "plan", "-plan"], "type": "string"}}], "responses": {"200": {"content": {"application/json": {"schema": {"properties": {"apps": {"items": {"$ref": "#/components/schemas/app_short"}, "type": "array"}, "count": {"description": "Total number of apps", "type": "integer"}}, "required": ["apps"], "type": "object"}}}, "description": "Returns paginated list of client applications with optional filters applied"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Requested resource not found"}}, "summary": "List client's apps", "tags": ["Apps"], "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\npage = client.fastedge.apps.list()\npage = page.apps[0]\nprint(page.id)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/fastedge\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tpage, err := client.Fastedge.Apps.List(context.TODO(), fastedge.AppListParams{})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", page)\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:apps list \\\n  --api-key 'My API Key'"}]}
    "post": {"description": "Create a new edge application from a WebAssembly binary.\nThe app is configured with execution limits, environment variables, and network assignments.\nApps start in draft status (0) and must be explicitly enabled to receive traffic.", "operationId": "addApp", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/app"}}}, "description": "App details", "required": false}, "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/app_short"}}}, "description": "Application created successfully, returns app metadata"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "429": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Application count limit exceeded for this client"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "Add a new app", "tags": ["Apps"], "x-codegen-request-body-name": "app", "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\napp_short = client.fastedge.apps.create()\nprint(app_short.id)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/fastedge\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tappShort, err := client.Fastedge.Apps.New(context.TODO(), fastedge.AppNewParams{})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", appShort.ID)\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:apps create \\\n  --api-key 'My API Key'"}]}
  "/fastedge/v1/apps/{app_id}":
    "delete": {"description": "Permanently delete an application and remove it from all edge networks.\nThis action cannot be undone. The associated binary is not deleted and can be reused.", "operationId": "delApp", "parameters": [{"description": "Unique identifier of the application to delete", "in": "path", "name": "app_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"204": {"description": "Application successfully deleted"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not found"}, "503": {"content": {"text/plain": {"schema": {"type": "string"}}}, "description": "Service unavailable"}}, "summary": "Delete app", "tags": ["Apps"], "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\nclient.fastedge.apps.delete(\n    0,\n)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\terr := client.Fastedge.Apps.Delete(context.TODO(), 0)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:apps delete \\\n  --api-key 'My API Key' \\\n  --app-id 0"}]}
    "get": {"description": "Retrieve complete configuration and metadata for a specific application.\nIncludes binary reference, plan limits, environment variables, and current status.", "operationId": "getApp", "parameters": [{"description": "Unique identifier of the application to retrieve", "in": "path", "name": "app_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/app"}}}, "description": "Returns complete application configuration and metadata"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not found"}}, "summary": "Get app details", "tags": ["Apps"], "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\napp = client.fastedge.apps.get(\n    0,\n)\nprint(app.plan_id)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tapp, err := client.Fastedge.Apps.Get(context.TODO(), 0)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", app.PlanID)\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:apps get \\\n  --api-key 'My API Key' \\\n  --app-id 0"}]}
    "patch": {"description": "Partially update an application's configuration.\nOnly the fields provided in the request body will be modified; others remain unchanged.", "operationId": "patchApp", "parameters": [{"description": "ID of the app", "in": "path", "name": "app_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/app"}}}, "description": "App details", "required": false}, "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/app_short"}}}, "description": "Application updated successfully, returns updated metadata"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Application not found"}, "500": {"content": {"text/plain": {"schema": {"type": "string"}}}, "description": "Internal server error occurred"}, "503": {"content": {"text/plain": {"schema": {"type": "string"}}}, "description": "Service unavailable"}}, "summary": "Update app", "tags": ["Apps"], "x-codegen-request-body-name": "app", "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\napp_short = client.fastedge.apps.update(\n    app_id=0,\n)\nprint(app_short.id)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/fastedge\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tappShort, err := client.Fastedge.Apps.Update(\n\t\tcontext.TODO(),\n\t\t0,\n\t\tfastedge.AppUpdateParams{},\n\t)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", appShort.ID)\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:apps update \\\n  --api-key 'My API Key' \\\n  --app-id 0"}]}
    "put": {"description": "Replace the complete configuration of an existing application.\nAll fields must be provided - use PATCH for partial updates.", "operationId": "updateApp", "parameters": [{"description": "ID of the app", "in": "path", "name": "app_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "requestBody": {"content": {"application/json": {"schema": {"allOf": ["$ref": "#/components/schemas/app", {"required": ["binary", "status"], "type": "object"}]}}}, "description": "App details", "required": false}, "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/app_short"}}}, "description": "Application updated successfully, returns updated metadata"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Application not found"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service temporarily unavailable, retry later"}}, "summary": "Update an app", "tags": ["Apps"], "x-codegen-request-body-name": "app", "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\napp_short = client.fastedge.apps.replace(\n    app_id=0,\n)\nprint(app_short.id)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/fastedge\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tappShort, err := client.Fastedge.Apps.Replace(\n\t\tcontext.TODO(),\n\t\t0,\n\t\tfastedge.AppReplaceParams{},\n\t)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", appShort.ID)\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:apps replace \\\n  --api-key 'My API Key' \\\n  --app-id 0"}]}
  "/fastedge/v1/apps/{app_id}/logs":
    "get": {"description": "List logs for the app", "operationId": "listLogs", "parameters": [{"description": "Unique identifier of the application to retrieve logs for", "in": "path", "name": "app_id", "required": true, "schema": {"format": "int64", "type": "integer"}}, {"description": "Start of log retrieval period in RFC3339 format. Defaults to 1 hour ago if not specified.", "in": "query", "name": "from", "schema": {"example": "2023-12-31T23:59:59Z", "format": "date-time", "type": "string"}}, {"description": "Reporting period end time, RFC3339 format. Default current time in UTC.", "in": "query", "name": "to", "schema": {"example": "2026-01-31T23:59:59Z", "format": "date-time", "type": "string"}}, {"description": "Edge name", "in": "query", "name": "edge", "schema": {"format": "string", "type": "string"}}, {"description": "Search string", "in": "query", "name": "search", "schema": {"format": "string", "type": "string"}}, {"description": "Search by client IP address", "in": "query", "name": "client_ip", "schema": {"type": "string"}}, {"description": "Search by request ID", "in": "query", "name": "request_id", "schema": {"type": "string"}}, {"description": "Sort order (default desc)", "in": "query", "name": "sort", "schema": {"enum": ["desc", "asc"], "format": "string", "type": "string"}}, {"description": "Limit for pagination", "in": "query", "name": "limit", "schema": {"format": "int32", "type": "integer"}}, {"description": "Offset for pagination", "in": "query", "name": "offset", "schema": {"format": "int32", "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"properties": {"count": {"description": "Number of logs available", "format": "int32", "type": "integer"}, "logs": {"items": {"$ref": "#/components/schemas/log"}, "type": "array"}, "offset": {"description": "Current request offset", "format": "int32", "type": "integer"}, "total_count": {"deprecated": true, "description": "Number of total logs available (do not use, to be removed)", "format": "int32", "type": "integer"}}, "required": ["count"], "type": "object"}}}, "description": "A paged array of logs"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not found"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "List application logs", "tags": ["Apps"], "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\npage = client.fastedge.apps.logs.list(\n    app_id=0,\n)\npage = page.logs[0]\nprint(page.id)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/fastedge\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tpage, err := client.Fastedge.Apps.Logs.List(\n\t\tcontext.TODO(),\n\t\t0,\n\t\tfastedge.AppLogListParams{},\n\t)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", page)\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:apps:logs list \\\n  --api-key 'My API Key' \\\n  --app-id 0"}]}
  "/fastedge/v1/apps/by-name/{name}":
    "get": {"deprecated": true, "operationId": "getAppIdByName", "parameters": [{"description": "Application name to look up", "in": "path", "name": "name", "required": true, "schema": {"type": "string"}}], "responses": {"200": {"content": {"application/json": {"schema": {"format": "int64", "type": "integer"}}}, "description": "Returns the application ID for the specified name"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}}, "summary": "Get app id by app name", "tags": ["Apps"]}
  "/fastedge/v1/binaries":
    "get": {"description": "Retrieve all WebAssembly binaries owned by the authenticated client.\nBinaries can be shared across multiple applications and include both WASI and Proxy-WASM formats.", "operationId": "listBinaries", "responses": {"200": {"content": {"application/json": {"schema": {"properties": {"binaries": {"items": {"$ref": "#/components/schemas/binary_short"}, "type": "array"}}, "required": ["binaries"], "type": "object"}}}, "description": "Returns list of all WebAssembly binaries owned by the client"}}, "summary": "List binaries", "tags": ["Binaries"], "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\nbinaries = client.fastedge.binaries.list()\nprint(binaries.binaries)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tbinaries, err := client.Fastedge.Binaries.List(context.TODO())\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", binaries.Binaries)\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:binaries list \\\n  --api-key 'My API Key'"}]}
  "/fastedge/v1/binaries/{binary_id}":
    "delete": {"description": "Delete a WebAssembly binary from the platform.\nNote: Binaries currently in use by applications cannot be deleted. Remove all application associations first.", "operationId": "delBinary", "parameters": [{"description": "Unique identifier of the binary to delete", "in": "path", "name": "binary_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"204": {"description": "Binary successfully deleted"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not found"}, "409": {"description": "Binary referenced"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "Delete a binary", "tags": ["Binaries"], "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\nclient.fastedge.binaries.delete(\n    0,\n)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\terr := client.Fastedge.Binaries.Delete(context.TODO(), 0)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:binaries delete \\\n  --api-key 'My API Key' \\\n  --binary-id 0"}]}
    "get": {"description": "Retrieve complete information about a specific WebAssembly binary including metadata and compiled content.\nUse this to download or inspect binaries before using them in applications.", "operationId": "getBinary", "parameters": [{"description": "Unique identifier of the binary to retrieve", "in": "path", "name": "binary_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/binary"}}}, "description": "Returns detailed binary information including metadata and content"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not found"}}, "summary": "Get binary", "tags": ["Binaries"], "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\nbinary = client.fastedge.binaries.get(\n    0,\n)\nprint(binary.id)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tbinary, err := client.Fastedge.Binaries.Get(context.TODO(), 0)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", binary.ID)\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:binaries get \\\n  --api-key 'My API Key' \\\n  --binary-id 0"}]}
  "/fastedge/v1/binaries/raw":
