    store_entry_short: {"type": "object", "description": "Edge store entry", "required": ["key", "datatype"], "properties": {"key": {"type": "string", "description": "Key of the item", "minLength": 1, "maxLength": 256}, "datatype": {"$ref": "#/components/schemas/kv_datatype"}, "payload": {"$ref": "#/components/schemas/store_kv_pair_value"}}}
    store_kv_pair_value: {"type": "object", "description": "KV pair value", "allOf": ["$ref": "#/components/schemas/encoded_value", {"type": "object", "properties": {"expiry": {"type": "string", "description": "Optional expiration timestamp in RFC3339 format. Entry is automatically deleted after this time.", "example": "2024-12-31T23:59:59Z"}}}]}
    store_sorted_set: {"type": "array", "description": "Sorted set items", "items": {"$ref": "#/components/schemas/store_sorted_set_item"}}
