  "/fastedge/v1/stats/app_duration":
    "get": {"description": "Retrieve execution time statistics showing how long applications took to process requests.\nResults are aggregated by the specified time interval and can be filtered by app and network.", "operationId": "StatsDuration", "parameters": [{"description": "Filter statistics by specific application ID", "in": "query", "name": "id", "schema": {"format": "int64", "type": "integer"}}, {"description": "Reporting period start time in RFC3339 format", "example": "2026-01-01T00:00:00Z", "in": "query", "name": "from", "required": true, "schema": {"format": "date-time", "type": "string"}}, {"description": "Reporting period end time in RFC3339 format (exclusive)", "example": "2026-01-31T23:59:59Z", "in": "query", "name": "to", "required": true, "schema": {"format": "date-time", "type": "string"}}, {"description": "Reporting time granularity in seconds. Common values are 60 (1 minute), 300 (5 minutes), 3600 (1 hour).", "example": 300, "in": "query", "name": "step", "required": true, "schema": {"default": 60, "type": "integer"}}, {"description": "Filter statistics by edge network name", "example": "gcore", "in": "query", "name": "network", "schema": {"format": "string", "type": "string"}}], "responses": {"200": {"content": {"application/json": {"schema": {"properties": {"stats": {"items": {"$ref": "#/components/schemas/duration_stats"}, "type": "array"}}, "required": ["stats"], "type": "object"}}}, "description": "Returns execution duration statistics for the specified time period"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}}, "summary": "Execution duration statistics", "tags": ["Stats"], "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom datetime import datetime\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\nresponse = client.fastedge.statistics.get_duration_series(\n    from_=datetime.fromisoformat(\"2019-12-27T18:11:19.117\"),\n    step=0,\n    to=datetime.fromisoformat(\"2019-12-27T18:11:19.117\"),\n)\nprint(response.stats)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\t\"time\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/fastedge\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tresponse, err := client.Fastedge.Statistics.GetDurationSeries(context.TODO(), fastedge.StatisticGetDurationSeriesParams{\n\t\tFrom: time.Now(),\n\t\tStep: 0,\n\t\tTo:   time.Now(),\n\t})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", response.Stats)\n}\n"}, {"lang": "CLI", "source": "gcx fastedge:statistics get-duration-series \\\n  --api-key 'My API Key' \\\n  --from \"'2019-12-27T18:11:19.117Z'\" \\\n  --step 0 \\\n  --to \"'2019-12-27T18:11:19.117Z'\""}]}
