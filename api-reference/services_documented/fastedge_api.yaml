    client: {"required": ["status", "hourly_consumption", "daily_consumption", "app_count", "monthly_consumption", "networks", "plan_id"], "type": "object", "properties": {"status": {"type": "integer", "description": "Status code:  \n1 - enabled  \n2 - disabled  \n5 - suspended", "minimum": 1, "maximum": 5}, "hourly_consumption": {"type": "integer", "description": "Actual number of calls for all apps during the current hour"}, "daily_consumption": {"type": "integer", "description": "Actual number of calls for all apps during the current day (UTC)"}, "app_count": {"type": "integer", "description": "Actual allowed number of apps"}, "monthly_consumption": {"type": "integer", "description": "Actual number of calls for all apps during the current calendar month (UTC)"}, "networks": {"type": "array", "description": "List of enabled networks", "items": {"$ref": "#/components/schemas/network"}}, "plan_id": {"type": "integer", "format": "int64", "description": "Plan ID"}, "plan": {"readOnly": true, "type": "string", "description": "Plan name"}}}
    conflictError: {"type": "object", "required": ["error", "conflicting_ids"], "properties": {"error": {"type": "string", "description": "Error message"}, "conflicting_ids": {"type": "array", "items": {"type": "integer", "format": "int64"}, "description": "List of conflicting entity IDs"}}}
    count_by_status: {"type": "object", "required": ["status", "count"], "properties": {"status": {"type": "integer", "description": "HTTP status"}, "count": {"type": "integer", "description": "Number of app calls"}}}
    duration_stats: {"type": "object", "description": "Edge app execution duration statistics", "required": ["time", "min", "max", "avg", "median", "perc75", "perc90"], "properties": {"time": {"type": "string", "format": "date-time", "description": "Beginning of reporting slot"}, "min": {"type": "integer", "format": "int64", "description": "Min duration in usec"}, "max": {"type": "integer", "format": "int64", "description": "Max duration in usec"}, "avg": {"type": "integer", "format": "int64", "description": "Average duration in usec"}, "median": {"type": "integer", "format": "int64", "description": "Median (50% percentile) duration in usec"}, "perc75": {"type": "integer", "format": "int64", "description": "75% percentile duration in usec"}, "perc90": {"type": "integer", "format": "int64", "description": "90% percentile duration in usec"}}}
    encoded_value: {"type": "object", "description": "Value with encoding", "required": ["value"], "properties": {"value": {"type": "string", "description": "Data value, encoded according to the specified encoding method (see 'encoding' field)", "maxLength": 1048576, "example": "John Doe"}, "encoding": {"type": "string", "description": "Value encoding method:  \nplain - unencoded text  \nbase64 - base64-encoded binary data  \nsha256 - SHA-256 hash (output only), for fields larger than 1024 bytes", "enum": ["plain", "base64", "sha256"], "default": "plain", "x-go-type-skip-optional-pointer": true, "example": "plain"}}}
    error: {"type": "object", "required": ["error"], "properties": {"error": {"type": "string", "description": "Error message"}}}
    kvStoreStats: {"type": "object", "required": ["read_count", "write_size", "storage_size", "del_count"], "properties": {"time": {"type": "string", "format": "date-time", "description": "Beginning of reporting slot"}, "read_count": {"type": "integer", "format": "int64", "description": "Number of read operations"}, "write_size": {"type": "integer", "format": "int64", "description": "Volume of write operations, in bytes"}, "storage_size": {"type": "number", "format": "double", "description": "Storage size used over time, in MB*hours"}, "del_count": {"type": "integer", "format": "int64", "description": "Number of delete operations"}}}
