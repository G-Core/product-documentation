    "post": {"description": "Create a new application template from an existing binary and configuration.\nTemplates can be shared with groups to enable collaborative application development.", "operationId": "addTemplate", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/template"}}}, "description": "Template details", "required": true}, "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/template_short"}}}, "description": "Template created successfully, returns template metadata"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service temporarily unavailable"}}, "summary": "Add template", "tags": ["FastEdge Templates"], "x-codeSamples": [{"lang": "Python", "source": "import os\nfrom gcore import Gcore\n\nclient = Gcore(\n    api_key=os.environ.get(\"GCORE_API_KEY\"),  # This is the default and can be omitted\n)\ntemplate_short = client.fastedge.templates.create(\n    binary_id=12345,\n    name=\"api-gateway-template\",\n    owned=True,\n    params=[{\n        \"data_type\": \"string\",\n        \"mandatory\": True,\n        \"name\": \"api_key\",\n    }],\n)\nprint(template_short.id)"}, {"lang": "Go", "source": "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/G-Core/gcore-go\"\n\t\"github.com/G-Core/gcore-go/fastedge\"\n\t\"github.com/G-Core/gcore-go/option\"\n)\n\nfunc main() {\n\tclient := gcore.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\ttemplateShort, err := client.Fastedge.Templates.New(context.TODO(), fastedge.TemplateNewParams{\n\t\tTemplate: fastedge.TemplateParam{\n\t\t\tBinaryID: 12345,\n\t\t\tName:     \"api-gateway-template\",\n\t\t\tOwned:    true,\n\t\t\tParams: []fastedge.TemplateParameter{{\n\t\t\t\tDataType:  fastedge.TemplateParameterDataTypeSt