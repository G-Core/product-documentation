"openapi": "3.1.0"
"info": {"title": "Gcore OpenAPI – FastEdge Reseller API", "description": "This OpenAPI is an aggregated OpenAPI specification that unifies all Gcore products into a single file. It covers Cloud, CDN, DNS, WAAP, DDoS Protection, Object Storage, Streaming, and FastEdge services.", "version": "2026-04-28T08:58:36.675713+00:00"}
"servers": ["url": "https://api.gcore.com"]
paths:
  "/fastedge/v1/admin/apps":
    "get": {"description": "Retrieve applications across all clients with advanced filtering and pagination.\nAdmins can view and manage applications for any client in their reseller scope.", "operationId": "listAppsAdmin", "parameters": [{"description": "Filter applications by client ID. Omit to see all apps across all clients.", "example": 1000, "in": "query", "name": "client_id", "required": false, "schema": {"format": "int64", "minimum": 1, "type": "integer"}}, {"description": "Filter by application name (case-insensitive partial match)", "in": "query", "name": "name", "required": false, "schema": {"maxLength": 255, "minLength": 1, "type": "string"}}, {"description": "API type:  \nwasi-http - WASI with HTTP entry point  \nproxy-wasm - Proxy-Wasm app, callable from CDN", "example": "wasi-http", "in": "query", "name": "api_type", "required": false, "schema": {"enum": ["wasi-http", "proxy-wasm"], "type": "string"}}, {"description": "Status code:  \n0 - draft (inactive)  \n1 - enabled  \n2 - disabled  \n3 - hourly call limit exceeded  \n4 - daily call limit exceeded  \n5 - suspended", "example": 1, "in": "query", "name": "status", "required": false, "schema": {"maximum": 5, "minimum": 0, "type": "integer"}}, {"description": "Filter by template ID", "in": "query", "name": "template", "required": false, "schema": {"format": "int64", "minimum": 1, "type": "integer"}}, {"description": "Filter by binary ID", "in": "query", "name": "binary", "required": false, "schema": {"format": "int64", "minimum": 1, "type": "integer"}}, {"description": "Filter by plan ID", "example": 10, "in": "query", "name": "plan", "required": false, "schema": {"format": "int64", "minimum": 1, "type": "integer"}}, {"description": "Maximum number of results to return", "example": 50, "in": "query", "name": "limit", "required": false, "schema": {"default": 50, "maximum": 1000, "minimum": 1, "type": "integer"}}, {"description": "Number of results to skip for pagination", "example": 0, "in": "query", "name": "offset", "required": false, "schema": {"default": 0, "minimum": 0, "type": "integer"}}, {"description": "Sort order. Use - prefix for descending (e.g., -name sorts by name descending)", "example": "-id", "in": "query", "name": "ordering", "schema": {"enum": ["name", "-name", "status", "-status", "id", "-id", "template", "-template", "binary", "-binary", "plan", "-plan", "client", "-client"], "type": "string"}}], "responses": {"200": {"content": {"application/json": {"schema": {"properties": {"apps": {"items": {"$ref": "#/components/schemas/app_short_admin"}, "type": "array"}, "count": {"description": "Total number of apps", "type": "integer"}}, "required": ["apps"], "type": "object"}}}, "description": "Returns paginated list of applications across all clients with filters applied"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}}, "summary": "Get app list", "tags": ["FastEdge Reseller Apps"]}
  "/fastedge/v1/admin/apps/{app_id}":
    "delete": {"description": "Permanently delete any application in the system with admin privileges.\nUse with caution; this removes the app from all edge networks immediately.", "operationId": "delAppAdmin", "parameters": [{"description": "ID of the app", "in": "path", "name": "app_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"204": {"description": "Application successfully deleted"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not found"}, "503": {"content": {"text/plain": {"schema": {"type": "string"}}}, "description": "Service unavailable"}}, "summary": "Delete an app", "tags": ["FastEdge Reseller Apps"]}
    "get": {"description": "Retrieve complete application configuration including client ownership information.\nProvides admin-level visibility into any application in the system.", "operationId": "getAppAdmin", "parameters": [{"description": "ID of the app", "in": "path", "name": "app_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"allOf": ["$ref": "#/components/schemas/app", {"properties": {"client_id": {"description": "Client ID", "format": "int64", "type": "integer"}}, "required": ["client_id"], "type": "object"}]}}}, "description": "Returns complete application configuration and metadata including client ID"}, "404": {"description": "Not found"}}, "summary": "Get app details", "tags": ["FastEdge Reseller Apps"]}
    "patch": {"description": "Partially update application settings with admin privileges.\nOnly provided fields are modified; others remain unchanged.", "operationId": "patchAppAdmin", "parameters": [{"description": "ID of the app", "in": "path", "name": "app_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/app"}}}, "description": "App details", "required": false}, "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/app_short"}}}, "description": "Application partially updated, returns updated metadata"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not found"}, "500": {"content": {"text/plain": {"schema": {"type": "string"}}}, "description": "Error occurred"}, "503": {"content": {"text/plain": {"schema": {"type": "string"}}}, "description": "Service unavailable"}}, "summary": "Patch an app", "tags": ["FastEdge Reseller Apps"], "x-codegen-request-body-name": "app"}
    "put": {"description": "Modify application configuration with admin privileges.\nAllows updating apps owned by any client in the reseller scope.", "operationId": "updateAppAdmin", "parameters": [{"description": "ID of the app", "in": "path", "name": "app_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/app"}}}, "description": "App details", "required": false}, "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/app_short"}}}, "description": "Application updated successfully, returns updated metadata"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "401": {"description": "Unauthorised"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "Update an app", "tags": ["FastEdge Reseller Apps"], "x-codegen-request-body-name": "app"}
  "/fastedge/v1/admin/apps/client/{client_id}":
    "get": {"deprecated": true, "operationId": "listAppsClient", "parameters": [{"description": "ID of the client", "in": "path", "name": "client_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"properties": {"apps": {"items": {"$ref": "#/components/schemas/app_short_admin"}, "type": "array"}}, "required": ["apps"], "type": "object"}}}, "description": "Returns list of applications for the specified client"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}}, "summary": "Get apps for the specified client (use /v1/admin/apps instead)", "tags": ["FastEdge Reseller Apps"]}
  "/fastedge/v1/admin/clients":
    "get": {"description": "Retrieve clients of the reseller", "operationId": "listClients", "parameters": [{"description": "Filter by client name (case-insensitive partial match)", "in": "query", "name": "name", "required": false, "schema": {"maxLength": 255, "minLength": 1, "type": "string"}}, {"description": "Filter by client e-mail address (case-insensitive partial match)", "in": "query", "name": "email", "required": false, "schema": {"maxLength": 320, "minLength": 3, "type": "string"}}, {"description": "Filter by group ID (shows clients that belong to this group)", "in": "query", "name": "group__incl", "required": false, "schema": {"format": "int64", "minimum": 1, "type": "integer"}}, {"description": "Filter by client ID", "in": "query", "name": "client_id", "required": false, "schema": {"format": "int64", "minimum": 1, "type": "integer"}}, {"description": "Filter by group ID (shows clients that don't belong to this group)", "in": "query", "name": "group__excl", "required": false, "schema": {"format": "int64", "minimum": 1, "type": "integer"}}, {"description": "Maximum number of results to return", "example": 50, "in": "query", "name": "limit", "required": false, "schema": {"default": 50, "maximum": 1000, "minimum": 1, "type": "integer"}}, {"description": "Number of results to skip for pagination", "example": 0, "in": "query", "name": "offset", "required": false, "schema": {"default": 0, "minimum": 0, "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"properties": {"clients": {"items": {"$ref": "#/components/schemas/client_short"}, "type": "array"}, "count": {"description": "Total number of clients matching the filters", "type": "integer"}}, "required": ["clients", "count"], "type": "object"}}}, "description": "Returns paginated list of clients"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}}, "summary": "List clients", "tags": ["FastEdge Reseller Clients"]}
  "/fastedge/v1/admin/clients/{client_id}":
    "get": {"description": "Retrieve complete account information for a specific client including status, quotas, and plan assignment.\nShows current resource usage and any active restrictions.", "operationId": "getClient", "parameters": [{"description": "Unique identifier of the client", "in": "path", "name": "client_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"allOf": ["$ref": "#/components/schemas/client", {"properties": {"reseller_id": {"description": "Reseller ID", "format": "int64", "type": "integer"}}, "required": ["reseller_id"], "type": "object"}]}}}, "description": "Returns client status, limits, and quota information"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}}, "summary": "Get status and limits for the specified client", "tags": ["FastEdge Reseller Clients"]}
    "put": {"description": "Modify client account settings including status, resource limits, and plan assignment.\nUse this to enable/disable clients or adjust their quotas.", "operationId": "updateClient", "parameters": [{"description": "Unique identifier of the client", "in": "path", "name": "client_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/clientUpdate"}}}, "description": "Updated client configuration (status, limits, and quotas)", "required": false}, "responses": {"204": {"description": "Client updated successfully"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "401": {"description": "Unauthorized - insufficient permissions"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service temporarily unavailable"}}, "summary": "Update status and/or limits for the specified client", "tags": ["FastEdge Reseller Clients"]}
  "/fastedge/v1/admin/groups":
    "get": {"description": "Retrieve collaboration groups for client organization and resource sharing.\nGroups enable sharing of binaries and templates between multiple clients.", "operationId": "listGroups", "parameters": [{"description": "Filter by template ID (shows groups that include this template)", "in": "query", "name": "template__incl", "required": false, "schema": {"format": "int64", "type": "integer"}}, {"description": "Filter by template ID (shows groups that exclude this template)", "in": "query", "name": "template__excl", "required": false, "schema": {"format": "int64", "type": "integer"}}, {"description": "Filter by client ID (shows groups that include this client)", "in": "query", "name": "client__incl", "required": false, "schema": {"format": "int64", "type": "integer"}}, {"description": "Filter by client ID (shows groups that exclude this client)", "in": "query", "name": "client__excl", "required": false, "schema": {"format": "int64", "type": "integer"}}, {"description": "Filter by group name (case-insensitive partial match)", "in": "query", "name": "name", "required": false, "schema": {"type": "string"}}, {"description": "Maximum number of results to return (default 10)", "example": 10, "in": "query", "name": "limit", "schema": {"type": "integer"}}, {"description": "Number of results to skip for pagination", "example": 0, "in": "query", "name": "offset", "schema": {"type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"properties": {"count": {"description": "Total number of groups", "type": "integer"}, "groups": {"items": {"$ref": "#/components/schemas/group_short"}, "type": "array"}}, "required": ["groups"], "type": "object"}}}, "description": "Returns paginated list of client groups"}}, "summary": "List groups", "tags": ["Groups"]}
    "post": {"description": "Create a new collaboration group for sharing resources between clients.\nGroups can have capacity limits on member count.", "operationId": "addGroup", "requestBody": {"content": {"application/json": {"schema": {"properties": {"default_flag": {"default": false, "description": "Add new members to the group by default", "type": "boolean"}, "descr": {"description": "Group description", "type": "string"}, "name": {"description": "Group name", "type": "string"}}, "required": ["name"], "type": "object"}}}, "description": "Group description"}, "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/group_short"}}}, "description": "Group created successfully, returns group metadata"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "Add new group", "tags": ["Groups"]}
  "/fastedge/v1/admin/groups/{group_id}":
    "delete": {"description": "Remove a collaboration group from the system.\nAll member associations are removed, but shared resources remain available to original owners.", "operationId": "delGroup", "parameters": [{"description": "Group ID", "in": "path", "name": "group_id", "required": true, "schema": {"format": "int64", "type": "integer"}}, {"description": "Delete even if group is non-empty", "in": "query", "name": "force", "required": false, "schema": {"default": false, "type": "boolean"}}], "responses": {"204": {"description": "Group successfully deleted"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not found"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "Delete group", "tags": ["Groups"]}
    "get": {"description": "Retrieve complete group information including member list and sharing permissions.\nShows which clients can share resources within the group.", "operationId": "getGroup", "parameters": [{"description": "Group ID", "in": "path", "name": "group_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/group"}}}, "description": "Returns complete group configuration and membership details"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not found"}}, "summary": "Get group details", "tags": ["Groups"]}
    "put": {"description": "Modify group configuration including name, member capacity, and default membership settings.\nChanges affect future operations; existing members are not impacted.", "operationId": "updateGroup", "parameters": [{"description": "Group ID", "in": "path", "name": "group_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "requestBody": {"content": {"application/json": {"schema": {"properties": {"default_flag": {"default": false, "description": "Add new members to the group by default", "type": "boolean"}, "descr": {"description": "Group description", "type": "string"}, "name": {"description": "Group name", "type": "string"}}, "required": ["name"], "type": "object"}}}, "description": "Group description"}, "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/group_short"}}}, "description": "Group updated successfully, returns updated metadata"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "Update group", "tags": ["Groups"]}
  "/fastedge/v1/admin/groups/{group_id}/client/{client_id}":
    "delete": {"description": "Remove a client's membership from a collaboration group.\nThey lose access to group-shared resources but retain their own resources.", "operationId": "delFromGroup", "parameters": [{"description": "Group ID", "in": "path", "name": "group_id", "required": true, "schema": {"format": "int64", "type": "integer"}}, {"description": "Client ID", "in": "path", "name": "client_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"204": {"description": "Client successfully removed from the group"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not found"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "Remove client from the group", "tags": ["Groups"]}
    "post": {"description": "Add a client as a member of a collaboration group.\nMembers can access shared binaries and templates within the group.", "operationId": "addToGroup", "parameters": [{"description": "Group ID", "in": "path", "name": "group_id", "required": true, "schema": {"format": "int64", "type": "integer"}}, {"description": "Client ID", "in": "path", "name": "client_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"204": {"description": "Client successfully added to the group"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "404": {"description": "Not found"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "Add client to the group", "tags": ["Groups"]}
  "/fastedge/v1/admin/networks":
    "get": {"operationId": "listResellerNetworks", "parameters": [{"description": "ID of the client the networks are applicable to", "in": "query", "name": "client_id", "schema": {"format": "int64", "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"properties": {"networks": {"description": "List of available networks", "items": {"$ref": "#/components/schemas/network"}, "type": "array"}}, "required": ["networks"]}}}, "description": "Returns list of available networks for the client"}}, "summary": "List available networks", "tags": ["fastedge_reseller_other"]}
  "/fastedge/v1/admin/plans":
    "get": {"description": "Retrieve all subscription plans available in the system.\nPlans define resource limits and quotas for client applications.", "operationId": "listPlans", "parameters": [{"description": "Filter plans by client ID. Shows plans applicable to the specified client.", "example": 1000, "in": "query", "name": "client_id", "schema": {"format": "int64", "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"properties": {"plans": {"items": {"$ref": "#/components/schemas/plan"}, "type": "array"}}, "required": ["plans"], "type": "object"}}}, "description": "Returns list of all available subscription plans"}}, "summary": "List available plans", "tags": ["Plans"]}
    "post": {"description": "Create a new subscription plan with specific resource limits.\nPlans control memory, execution time, and API call quotas for client applications.", "operationId": "addPlan", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/plan"}}}, "description": "Plan details", "required": false}, "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/plan"}}}, "description": "Plan created successfully, returns plan configuration"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service temporarily unavailable"}}, "summary": "Add a new plan", "tags": ["Plans"], "x-codegen-request-body-name": "plan"}
  "/fastedge/v1/admin/plans/{plan_id}":
    "delete": {"description": "Remove a subscription plan from the system.\nPlans currently assigned to clients cannot be deleted.", "operationId": "delPlan", "parameters": [{"description": "Unique identifier of the plan to delete", "in": "path", "name": "plan_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"204": {"description": "Plan successfully deleted"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Plan is in use by clients and cannot be deleted"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service temporarily unavailable"}}, "summary": "Delete a plan", "tags": ["Plans"]}
    "get": {"description": "Retrieve complete configuration for a specific subscription plan.\nShows all resource limits, quotas, and billing integration settings.", "operationId": "getPlan", "parameters": [{"description": "Unique identifier of the plan to retrieve", "in": "path", "name": "plan_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/plan"}}}, "description": "Returns complete plan configuration and limits"}}, "summary": "Get plan details", "tags": ["Plans"]}
    "put": {"description": "Modify an existing subscription plan's configuration.\nChanges affect all clients using this plan; use with caution.", "operationId": "updatePlan", "parameters": [{"description": "Unique identifier of the plan to update", "in": "path", "name": "plan_id", "required": true, "schema": {"format": "int64", "type": "integer"}}], "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/plan"}}}, "description": "Complete plan configuration (replaces existing)", "required": false}, "responses": {"204": {"description": "Plan updated successfully"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "Update a plan", "tags": ["Plans"], "x-codegen-request-body-name": "plan"}
  "/fastedge/v1/admin/prebilling":
    "post": {"operationId": "listPrebilling", "requestBody": {"content": {"application/json": {"schema": {"properties": {"clients": {"example": [141309, 1111], "items": {"format": "int64", "type": "integer"}, "type": "array"}, "flat": {"description": "This field is not actually used, it is here only to comply with Billing API. If specified, it must be set to true.", "type": "boolean"}, "from": {"description": "Start date-time in RFC3339 format", "example": "2026-01-01T00:00:00Z", "format": "date-time", "type": "string"}, "group_by": {"example": ["client", "region", "billing_plan"], "items": {"enum": ["client", "region", "billing_plan"], "type": "string"}, "type": "array"}, "metrics": {"example": ["number_of_calls", "total_runtime_mms"], "items": {"enum": ["number_of_calls", "total_runtime_mms", "exec_time", "kv_storage_size", "kv_read_count", "kv_write_size", "kv_del_count"], "type": "string"}, "type": "array"}, "networks": {"example": ["gcore"], "items": {"type": "string"}, "type": "array"}, "service": {"description": "Must containt `FAST_EDGE` value", "example": "FAST_EDGE", "type": "string"}, "to": {"description": "End date-time in RFC3339 format", "example": "2026-01-31T23:59:59Z", "format": "date-time", "type": "string"}}, "required": ["service", "from", "to", "metrics"], "type": "object"}}}, "description": "Prebilling request", "required": true}, "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/prebillingResponse"}}}, "description": "Returns prebilling response data for the specified period"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "Get prebilling data", "tags": ["Billing"]}
  "/fastedge/v1/admin/prebilling_consumption":
    "get": {"deprecated": true, "operationId": "listPrebillingConsumption", "parameters": [{"description": "Start date in yyyy-MM-dd format", "in": "query", "name": "from", "required": true, "schema": {"format": "date", "type": "string"}}, {"description": "End date in yyyy-MM-dd format", "in": "query", "name": "to", "required": true, "schema": {"format": "date", "type": "string"}}, {"description": "Limit for pagination", "in": "query", "name": "limit", "required": true, "schema": {"format": "int32", "type": "integer"}}, {"description": "Offset for pagination", "in": "query", "name": "offset", "required": true, "schema": {"format": "int32", "type": "integer"}}], "responses": {"200": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/prebillingConsumptionResponse"}}}, "description": "Returns prebilling consumption data for the specified parameters"}, "400": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Bad request"}, "503": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/error"}}}, "description": "Service unavailable"}}, "summary": "Get prebilling consumption", "tags": ["Billing"]}
  "/fastedge/v1/admin/template":
